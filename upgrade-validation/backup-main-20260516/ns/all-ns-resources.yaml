  kind: ConfigMap
  metadata:
    annotations:
      meta.helm.sh/release-name: tensor-fusion-sys
      meta.helm.sh/release-namespace: tensor-fusion-sys
    creationTimestamp: "2025-09-04T07:53:30Z"
    labels:
      app.kubernetes.io/managed-by: Helm
      app.kubernetes.io/version: 1.43.5
      helm.sh/chart: tensor-fusion-1.5.6
      tensor-fusion.ai/component: alert-manager
    name: tensor-fusion-sys-alert-manager-config
    namespace: tensor-fusion-sys
    resourceVersion: "1217"
    uid: 3c8cf76d-4eec-4eae-8f23-cfb843c6be0a
- apiVersion: v1
  data:
    config.yaml: |
      preemptClusterWideFromEnv: true
      alertRules:
      - alertTargetInstance: '{{ .worker }}-{{ .uuid }}'
        consecutiveCount: 3
        description: Worker {{ .worker }} from Node {{ .node }} is using more than {{ .Threshold
          }}% of its TFlops limit
        evaluationInterval: 15s
        name: WorkerTFlopsThrottled
        query: |
          SELECT workload, worker, uuid, node, MAX(compute_throttled_cnt)-MIN(compute_throttled_cnt) as throttled_increase
          FROM tf_worker_usage
          WHERE {{ .Conditions }}
          GROUP BY workload, worker, uuid, node
          HAVING throttled_increase > {{ .Threshold }}
        runbookURL: https://tensor-fusion.ai/guide/troubleshooting/handbook
        severity: P1
        summary: Worker TFlops Throttled
        threshold: 0
      - alertTargetInstance: '{{ .worker }}-{{ .uuid }}'
        consecutiveCount: 1
        description: Worker {{ .worker }} from Node {{ .node }} has switched VRAM {{ .switch_increase
          }} times in last 2 minutes, GPU may be too hot
        evaluationInterval: 2m
        name: WorkerVRAMSwitchCountIncreasing
        query: "SELECT workload, worker, uuid, node, MAX(vram_resumed_cnt)-MIN(vram_resumed_cnt)
          as switch_increase\nFROM tf_worker_usage \nWHERE {{ .Conditions }}\nGROUP BY workload,
          worker, uuid, node\nHAVING switch_increase > {{ .Threshold }}\n"
        runbookURL: https://tensor-fusion.ai/guide/troubleshooting/handbook
        severity: P1
        summary: Worker VRAM Switch Count Increasing
        threshold: 0
      - alertTargetInstance: '{{ .pool }}'
        consecutiveCount: 1
        description: Worker allocation failed, {{ .failure_increase }} times in last 30
          seconds for GPU Pool {{ .pool }}
        evaluationInterval: 30s
        name: WorkerAllocationFailed
        query: |
          SELECT pool, (MAX(total_allocation_fail_cnt) - MIN(total_allocation_fail_cnt)) as failure_increase,
          FROM tf_system_metrics
          WHERE {{ .Conditions }}
          GROUP BY pool
          HAVING failure_increase > {{ .Threshold }}
        runbookURL: https://tensor-fusion.ai/guide/troubleshooting/handbook
        severity: P1
        summary: Worker allocation failed for GPU Pool {{ .pool }}
        threshold: 0
      - alertTargetInstance: '{{ .uuid }}'
        consecutiveCount: 2
        description: 'GPU {{ .uuid }} on Node {{ .node }} in Pool {{ .pool }} has VRAM usage
          above {{ .Threshold }}% for 2 consecutive 30s, average usage: {{ .memory_used
          }}%'
        evaluationInterval: 30s
        name: GPUVRAMFull
        query: |
          SELECT
            node,
            pool,
            uuid,
            avg(memory_percentage) AS memory_used
          FROM tf_gpu_usage
          WHERE memory_percentage > {{ .Threshold }} AND {{ .Conditions }}
          GROUP BY node, pool, uuid
        severity: P1
        summary: GPU VRAM Full, used {{ .memory_used }}% on {{ .node }} {{ .uuid }}
        threshold: 97
      - alertTargetInstance: '{{ .uuid }}'
        consecutiveCount: 4
        description: 'GPU {{ .uuid }} on Node {{ .node }} in Pool {{ .pool }} has TFlops
          usage above {{ .Threshold }}% for 4 consecutive 30s, average usage: {{ .compute_used
          }}%'
        evaluationInterval: 30s
        name: GPUTFlopsFull
        query: |
          SELECT
            node,
            pool,
            uuid,
            avg(compute_percentage) AS compute_used
          FROM tf_gpu_usage
          WHERE compute_percentage > {{ .Threshold }} AND {{ .Conditions }}
          GROUP BY node, pool, uuid
        severity: P1
        summary: GPU TFlops Full, used {{ .compute_used }}% on {{ .node }} {{ .uuid }}
        threshold: 97
      - alertTargetInstance: '{{ .uuid }}'
        consecutiveCount: 3
        description: 'GPU {{ .uuid }} from Node {{ .node }} has temperature above {{ .Threshold
          }}°C, Average temperature: {{ .avg_temperature }}, GPU Pool: {{ .pool }}'
        evaluationInterval: 30s
        name: GPUTemperatureHigh
        query: |
          SELECT
            node,
            pool,
            uuid,
            avg(temperature) AS avg_temperature
          FROM tf_gpu_usage
          WHERE temperature > {{ .Threshold }} AND {{ .Conditions }}
          GROUP BY node, pool, uuid
        runbookURL: https://tensor-fusion.ai/guide/troubleshooting/handbook
        severity: P1
        summary: GPU Temperature High, {{ .avg_temperature }}°C on {{ .node }} {{ .uuid
          }}
        threshold: 90
      - alertTargetInstance: '{{ .node }}'
        consecutiveCount: 2
        description: Node {{ .node }} in Pool {{ .pool }} has available TFlops below {{
          .Threshold }}%
        evaluationInterval: 1m
        name: NodeTFlopsAllocationCritical
        query: |
          SELECT node, pool, (100 - avg(allocated_tflops_percent)) as tflops_available
          FROM tf_node_metrics
          WHERE {{ .Conditions }}
          GROUP BY node, pool
          HAVING tflops_available < {{ .Threshold }}
        severity: P0
        summary: Available TFlops below threshold, remaining {{ .tflops_available }}% for
          {{ .node }}
        threshold: 5
      - alertTargetInstance: '{{ .node }}'
        consecutiveCount: 2
        description: Node {{ .node }} in Pool {{ .pool }} has available TFlops below {{
          .Threshold }}%
        evaluationInterval: 1m
        name: NodeTFlopsAllocationWarning
        query: |
          SELECT node, pool, (100 - avg(allocated_tflops_percent)) as tflops_available
          FROM tf_node_metrics
          WHERE {{ .Conditions }}
          GROUP BY node, pool
          HAVING tflops_available < {{ .Threshold }}
        severity: P1
        summary: Node available TFlops below threshold, remaining {{ .tflops_available }}%
          for {{ .node }}
        threshold: 10
      - alertTargetInstance: '{{ .pool }}'
        consecutiveCount: 2
        description: Pool {{ .pool }} has available TFlops below {{ .Threshold }}%
        evaluationInterval: 1m
        name: PoolTotalTFlopsAllocationCritical
        query: |
          SELECT pool, (100 - avg(allocated_tflops_percent)) as tflops_available
          FROM tf_node_metrics
          WHERE {{ .Conditions }}
          GROUP BY pool
          HAVING tflops_available < {{ .Threshold }}
        severity: P0
        summary: Pool available TFlops below threshold, remaining {{ .tflops_available }}%
        threshold: 5
      - alertTargetInstance: '{{ .pool }}'
        consecutiveCount: 2
        description: Pool {{ .pool }} has available TFlops below {{ .Threshold }}%
        evaluationInterval: 1m
        name: PoolTotalTFlopsAllocationWarning
        query: |
          SELECT pool, (100 - avg(allocated_tflops_percent)) as tflops_available
          FROM tf_node_metrics
          WHERE {{ .Conditions }}
          GROUP BY pool
          HAVING tflops_available < {{ .Threshold }}
        severity: P1
        summary: Pool available TFlops below threshold, remaining {{ .tflops_available }}%
        threshold: 10
      - alertTargetInstance: '{{ .node }}'
        consecutiveCount: 2
        description: Node {{ .node }} in Pool {{ .pool }} has available VRAM below {{ .Threshold
          }}%
        evaluationInterval: 1m
        name: NodeVRAMAllocationCritical
        query: |
          SELECT node, pool, (100 - avg(allocated_vram_percent)) as vram_available
          FROM tf_node_metrics
          WHERE {{ .Conditions }}
          GROUP BY node, pool
          HAVING vram_available < {{ .Threshold }}
        severity: P1
        summary: Node available VRAM below threshold, remaining {{ .vram_available }}% for
          {{ .node }}
        threshold: 5
      - alertTargetInstance: '{{ .node }}'
        consecutiveCount: 2
        description: Node {{ .node }} in Pool {{ .pool }} has available VRAM below {{ .Threshold
          }}%
        evaluationInterval: 1m
        name: NodeVRAMAllocationWarning
        query: |
          SELECT node, pool, (100 - avg(allocated_vram_percent)) as vram_available
          FROM tf_node_metrics
          WHERE {{ .Conditions }}
          GROUP BY node, pool
          HAVING vram_available < {{ .Threshold }}
        severity: P1
        summary: Node available VRAM below threshold, remaining {{ .vram_available }}% for
          {{ .node }}
        threshold: 10
      - alertTargetInstance: '{{ .pool }}'
        consecutiveCount: 2
        description: Pool {{ .pool }} has available VRAM below {{ .Threshold }}%
        evaluationInterval: 1m
        name: PoolVRAMAllocationWarning
        query: |
          SELECT pool, (100 - avg(allocated_vram_percent)) as vram_available
          FROM tf_node_metrics
          WHERE {{ .Conditions }}
          GROUP BY pool
          HAVING vram_available < {{ .Threshold }}
        severity: P1
        summary: Pool available VRAM below threshold, remaining {{ .vram_available }}% for
          {{ .pool }}
        threshold: 10
      - alertTargetInstance: '{{ .node }}'
        consecutiveCount: 2
        description: GPU Node {{ .node }} has no workload running, should be decommissioned
        evaluationInterval: 5m
        name: EmptyGPU
        query: "SELECT DISTINCT node \nFROM tf_node_metrics \nWHERE {{ .Conditions }} AND
          node NOT IN (\n    SELECT DISTINCT node \n    FROM tf_worker_usage \n    WHERE
          {{ .Conditions }}\n)\n"
        severity: P2
        summary: Empty GPU without any workload, Node {{ .node }}
        threshold: 0
      - alertTargetInstance: '{{ .uuid }}'
        consecutiveCount: 3
        description: 'GPU {{ .uuid }} on Node {{ .node }} in Pool {{ .pool }} has been idle
          for 3 consecutive 10m, compute: {{ .compute }}, vram: {{ .vram }}'
        evaluationInterval: 10m
        name: IdleGPU
        query: |
          SELECT node, pool, uuid, avg(compute_percentage) as compute, avg(memory_percentage) vram
          FROM tf_gpu_usage
          WHERE {{ .Conditions }}
          GROUP BY node, pool, uuid
          HAVING compute < 1 and vram < {{ .Threshold }};
        severity: P2
        summary: 'Idle GPU found: {{ .uuid }} on Node {{ .node }}'
        threshold: 5
      metricsExtraPodLabels: {}
      metricsFormat: influx
      metricsTTL: 30d
    scheduler-config.yaml: |
      apiVersion: kubescheduler.config.k8s.io/v1
      clientConnection:
        burst: 100
        kubeconfig: ""
        qps: 50
      kind: KubeSchedulerConfiguration
      profiles:
      - pluginConfig:
        - args:
            maxWorkerPerNode: 256
            tflopsWeight: 0.3
            vramWeight: 0.7
          name: GPUResourcesFit
        - args:
            totalIntranetBandWidthGBps: 100
          name: GPUNetworkTopologyAware
        - args:
            ignoredResourceGroups:
              - "tensor-fusion.ai"
            scoringStrategy:
              requestedToCapacityRatio:
                shape:
                - score: 0
                  utilization: 0
                - score: 9
                  utilization: 75
                - score: 10
                  utilization: 100
              resources:
              - name: cpu
                weight: 1
              - name: memory
                weight: 1
              - name: nvidia.com/gpu
                weight: 5
              type: RequestedToCapacityRatio
          name: NodeResourcesFit
        plugins:
          preEnqueue:
            enabled:
            - name: GPUResourcesFit
          filter:
            enabled:
            - name: GPUResourcesFit
            - name: GPUNetworkTopologyAware
          postFilter:
            enabled:
            - name: DefaultPreemption
          postBind:
            enabled:
            - name: GPUResourcesFit
          preFilter:
            enabled:
            - name: GPUResourcesFit
            - name: GPUNetworkTopologyAware
          reserve:
            enabled:
            - name: GPUResourcesFit
          permit:
            enabled:
            - name: GPUResourcesFit
          score:
            enabled:
            - name: GPUResourcesFit
              weight: 5
            - name: GPUNetworkTopologyAware
              weight: 3
        schedulerName: tensor-fusion-scheduler

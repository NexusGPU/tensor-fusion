ame: cpu\n          weight: 1\n        - name: memory\n          weight: 1\n        - name: nvidia.com/gpu\n          weight: 5\n        type: RequestedToCapacityRatio\n    name: NodeResourcesFit\n  plugins:\n    preEnqueue:\n      enabled:\n      - name: GPUResourcesFit\n    filter:\n      enabled:\n      - name: GPUResourcesFit\n      - name: GPUNetworkTopologyAware\n    postFilter:\n      enabled:\n      - name: DefaultPreemption\n    postBind:\n      enabled:\n      - name: GPUResourcesFit\n    preFilter:\n      enabled:\n      - name: GPUResourcesFit\n    reserve:\n      enabled:\n      - name: GPUResourcesFit\n    permit:\n      enabled:\n      - name: GPUResourcesFit\n    score:\n      enabled:\n      - name: GPUResourcesFit\n        weight: 5\n  schedulerName: tensor-fusion-scheduler\n"},"kind":"ConfigMap","metadata":{"annotations":{"meta.helm.sh/release-name":"tensor-fusion-sys","meta.helm.sh/release-namespace":"tensor-fusion-sys"},"creationTimestamp":"2025-09-04T07:53:30Z","labels":{"app.kubernetes.io/managed-by":"Helm","app.kubernetes.io/version":"1.43.5","helm.sh/chart":"tensor-fusion-1.5.6","tensor-fusion.ai/component":"config"},"name":"tensor-fusion-sys-config","namespace":"tensor-fusion-sys","resourceVersion":"53422465","uid":"22fd7a2f-9bbc-4137-aab3-0d721eed73e5"}}

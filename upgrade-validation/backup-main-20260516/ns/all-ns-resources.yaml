- apiVersion: v1
  data:
    vector-hypervisor.yaml: "api:\n  enabled: true\n\nsources:\n  kubernetes_logs:\n
      \   type: kubernetes_logs\n    self_node_name: \"${NODE_NAME}\"\n    extra_label_selector:
      \"tensor-fusion.ai/component in (hypervisor,worker)\"\n  metrics:\n    type:
      file\n    data_dir: /logs\n    include:\n      - /logs/metrics.log.*\n\ntransforms:\n
      \ prepare_kubernetes_logs:\n    type: remap\n    inputs:\n      - kubernetes_logs\n
      \   source: |\n      .message = .message\n      .container = .kubernetes.container_name\n
      \     .pod = .kubernetes.pod_name\n      .namespace = .kubernetes.pod_namespace\n
      \     .component = .kubernetes.pod_labels.\"tensor-fusion.ai/component\"\n      del(.kubernetes)\n
      \     del(.file)\n      del(.source_type)\n\nsinks:\n  sink_greptimedb_hypervisor_metrics:\n
      \   type: http\n    inputs:\n      - metrics        \n    method: post\n    encoding:\n
      \     codec: text\n    uri: \"http://greptimedb-standalone.greptimedb.svc.cluster.local:4000/v1/influxdb/api/v2/write?db=public&precision=ms\"\n
      \   \n  sink_greptimedb_hypervisor_worker_logs:\n    type: greptimedb_logs\n
      \   compression: gzip\n    table: tf_system_log\n    inputs:\n      - prepare_kubernetes_logs\n
      \   endpoint: http://greptimedb-standalone.greptimedb.svc.cluster.local:4000\n
      \   dbname: public\n"
    vector-operator.yaml: "api:\n  enabled: true\nsources:\n  metrics:\n    type:
      file\n    data_dir: /logs\n    include:\n      - /logs/metrics*.log\n\n  kubernetes_logs:\n
      \   type: kubernetes_logs\n    self_node_name: \"${NODE_NAME}\"\n    extra_label_selector:
      \"tensor-fusion.ai/component in (operator)\"\n\ntransforms:\n  prepare_kubernetes_logs:\n
      \   type: remap\n    inputs:\n      - kubernetes_logs\n    source: |\n      .message
      = .message\n      .container = .kubernetes.container_name\n      .pod = .kubernetes.pod_name\n
      \     .namespace = .kubernetes.pod_namespace\n      .component = .kubernetes.pod_labels.\"tensor-fusion.ai/component\"\n
      \     del(.kubernetes)\n      del(.file)\n      del(.source_type)\nsinks:\n
      \ sink_greptimedb_operator_metrics:\n    type: http\n    inputs:\n      - metrics
      \       \n    method: post\n    encoding:\n      codec: text\n    uri: \"http://greptimedb-standalone.greptimedb.svc.cluster.local:4000/v1/influxdb/api/v2/write?db=public&precision=ms\"\n
      \ \n  sink_greptimedb_operator_logs:\n    type: greptimedb_logs\n    compression:
      gzip\n    table: tf_system_log\n    inputs:\n      - prepare_kubernetes_logs\n
      \   endpoint: http://greptimedb-standalone.greptimedb.svc.cluster.local:4000\n
      \   dbname: public\n"

# Source: tensor-fusion/templates/controller-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tensor-fusion-sys-controller
  namespace: tensor-fusion-sys
  labels:
    tensor-fusion.ai/component: operator
    helm.sh/chart: tensor-fusion-1.5.6
    app.kubernetes.io/version: "1.43.5"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tensor-fusion
      app.kubernetes.io/instance: tensor-fusion-sys
      app.kubernetes.io/component: controller
      tensor-fusion.ai/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tensor-fusion
        app.kubernetes.io/instance: tensor-fusion-sys
        app.kubernetes.io/component: controller
        tensor-fusion.ai/component: operator
    spec:
      serviceAccountName: tensor-fusion-sys
      enableServiceLinks: false
      containers:
        - name: controller
          image: "registry.cn-hangzhou.aliyuncs.com/tensorfusion/tensor-fusion-operator:latest"
          command:
            - /manager
            - -metrics-bind-address
            - :9000
            - -leader-elect
            - -enable-auto-scale
            - -enable-alert
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 2
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 50m
              memory: 256Mi
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 8081
          env:
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            # when deploy with AutoSelect mode, GPU node is managed by Kubernetes rather than TensorFusion, thus, need to specify the label selector to generate the GPUNode custom resource
            - name: INITIAL_GPU_NODE_LABEL_SELECTOR
              value: "nvidia.com/gpu.present=true"
            - name: TSDB_MYSQL_HOST
              value: "greptimedb-standalone.greptimedb.svc.cluster.local"
            - name: TSDB_MYSQL_PORT
              value: "4002"
            - name: TSDB_MYSQL_DATABASE
              value: "public"
            - name: TSDB_MYSQL_USER
              value: root
          volumeMounts:
            - name: cert
              readOnly: true
              mountPath: /tmp/k8s-webhook-server/serving-certs
            - name: logs
              mountPath: /logs
            - name: cloud-vendor-credentials
              mountPath: /tmp/secret
              readOnly: true
            - name: gpu-info
              mountPath: /etc/tensor-fusion/gpu-info.yaml
              subPath: gpu-info.yaml
              readOnly: true
            - name: config
              mountPath: /etc/tensor-fusion/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: config
              mountPath: /etc/tensor-fusion/scheduler-config.yaml
              subPath: scheduler-config.yaml
              readOnly: true
        - name: vector
          image: docker.m.daocloud.io/timberio/vector:latest-alpine
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - name: logs
              mountPath: /logs
            - name: vector-config
              mountPath: /etc/vector/vector.yaml
              subPath: vector-operator.yaml
            - name: kubernetes-logs
              mountPath: /var/log/pods
      volumes:
        - name: cert
          secret:
            secretName: tensor-fusion-webhook-secret
            defaultMode: 420
            items:
              - key: cert
                path: tls.crt
              - key: key
                path: tls.key
        - name: vector-config
          configMap:
            name: tensor-fusion-sys-vector-config
            defaultMode: 420
        - name: cloud-vendor-credentials
          secret:
            secretName: tf-cloud-vendor-credentials
            defaultMode: 420
        - configMap:
            defaultMode: 420
            name: tensor-fusion-sys-public-gpu-info
          name: gpu-info
        - configMap:
            defaultMode: 420
            name: tensor-fusion-sys-config
          name: config
        - name: logs
          emptyDir: {}
        - name: kubernetes-logs
          hostPath:
            path: /var/log/pods
            type: DirectoryOrCreate
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: tensor-fusion.ai/component
                operator: In
                values:
                - operator
            topologyKey: kubernetes.io/hostname

          args:
            - patch
            - --webhook-name=tensor-fusion-sys-mutating-webhook
            - --namespace=$(POD_NAMESPACE)
            - --patch-mutating=true
            - --patch-validating=false
            - --secret-name=tensor-fusion-webhook-secret
            - --patch-failure-policy=Ignore
          env:

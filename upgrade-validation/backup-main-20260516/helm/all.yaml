            - /etc/greptimedb/config.toml
          ports:
            - name: grpc
              containerPort: 4001
              protocol: TCP
            - name: http
              containerPort: 4000
              protocol: TCP
            - name: mysql
              containerPort: 4002
              protocol: TCP
            - name: postgres
              containerPort: 4003
              protocol: TCP
          resources:
            limits:
              cpu: 4000m
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: datanode
              mountPath: /data/greptimedb
            - name: logs
              mountPath: /data/greptimedb/logs
            - name: config
              mountPath: /etc/greptimedb
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
              scheme: HTTP
            timeoutSeconds: 1
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
              scheme: HTTP
            timeoutSeconds: 1
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 10
          startupProbe:
            httpGet:
              path: /health
              port: 4000
              scheme: HTTP
            timeoutSeconds: 1
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 60
          imagePullPolicy: Always
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
  volumeClaimTemplates:
    - kind: PersistentVolumeClaim
      apiVersion: v1
      metadata:
        name: datanode
        creationTimestamp: null
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
        volumeMode: Filesystem
  serviceName: ''
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  revisionHistoryLimit: 10

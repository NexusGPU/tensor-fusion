# Source: tensor-fusion/templates/vector-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: tensor-fusion-sys-vector-config
  namespace: tensor-fusion-sys
data:
  vector-operator.yaml: |
    api:
      enabled: true
    sources:
      metrics:
        type: file
        data_dir: /logs
        include:
          - /logs/metrics*.log

      kubernetes_logs:
        type: kubernetes_logs
        self_node_name: "${NODE_NAME}"
        extra_label_selector: "tensor-fusion.ai/component in (operator)"

    transforms:
      prepare_kubernetes_logs:
        type: remap
        inputs:
          - kubernetes_logs
        source: |
          .message = .message
          .container = .kubernetes.container_name
          .pod = .kubernetes.pod_name
          .namespace = .kubernetes.pod_namespace
          .component = .kubernetes.pod_labels."tensor-fusion.ai/component"
          del(.kubernetes)
          del(.file)
          del(.source_type)
    sinks:
      sink_greptimedb_operator_metrics:
        type: http
        inputs:
          - metrics        
        method: post
        encoding:
          codec: text
        uri: "http://greptimedb-standalone.greptimedb.svc.cluster.local:4000/v1/influxdb/api/v2/write?db=public&precision=ms"
      
      sink_greptimedb_operator_logs:
        type: greptimedb_logs
        compression: gzip
        table: tf_system_log
        inputs:
          - prepare_kubernetes_logs
        endpoint: http://greptimedb-standalone.greptimedb.svc.cluster.local:4000
        dbname: public

  vector-hypervisor.yaml: |
    api:
      enabled: true
    
    sources:
      kubernetes_logs:
        type: kubernetes_logs
        self_node_name: "${NODE_NAME}"
        extra_label_selector: "tensor-fusion.ai/component in (hypervisor,worker)"
      metrics:
        type: file
        data_dir: /logs
        include:
          - /logs/metrics.log.*
    
    transforms:
      prepare_kubernetes_logs:
        type: remap
        inputs:
          - kubernetes_logs
        source: |
          .message = .message
          .container = .kubernetes.container_name
          .pod = .kubernetes.pod_name
          .namespace = .kubernetes.pod_namespace
          .component = .kubernetes.pod_labels."tensor-fusion.ai/component"
          del(.kubernetes)
          del(.file)
          del(.source_type)

    sinks:
      sink_greptimedb_hypervisor_metrics:
        type: http
        inputs:
          - metrics        
        method: post
        encoding:
          codec: text
        uri: "http://greptimedb-standalone.greptimedb.svc.cluster.local:4000/v1/influxdb/api/v2/write?db=public&precision=ms"
        
      sink_greptimedb_hypervisor_worker_logs:
        type: greptimedb_logs
        compression: gzip
        table: tf_system_log
        inputs:
          - prepare_kubernetes_logs
        endpoint: http://greptimedb-standalone.greptimedb.svc.cluster.local:4000
        dbname: public

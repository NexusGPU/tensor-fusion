# Source: tensor-fusion/templates/admission-webhooks/mutating-webhook.yaml
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: tensor-fusion-sys-mutating-webhook
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: tensor-fusion-sys-webhook
      namespace: tensor-fusion-sys
      path: /mutate-v1-pod
  failurePolicy: Ignore
  name: mpod-v1.kb.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
  sideEffects: None
  timeoutSeconds: 10
# When it's progressive migration mode, remove the object selector so that all pods should be mutated 
# it's to identify resources used by native scheduler and device plugin, two types of workload won't overlap

  objectSelector:
    matchExpressions:
      - key: tensor-fusion.ai/enabled
        operator: In
        values:
          - "true"


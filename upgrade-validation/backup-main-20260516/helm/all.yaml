          avg(memory_percentage) AS memory_used
        FROM tf_gpu_usage
        WHERE memory_percentage > {{ .Threshold }} AND {{ .Conditions }}
        GROUP BY node, pool, uuid
      severity: P1
      summary: GPU VRAM Full, used {{ .memory_used }}% on {{ .node }} {{ .uuid }}
      threshold: 97
    - alertTargetInstance: '{{ .uuid }}'
      consecutiveCount: 4
      description: 'GPU {{ .uuid }} on Node {{ .node }} in Pool {{ .pool }} has TFlops
        usage above {{ .Threshold }}% for 4 consecutive 30s, average usage: {{ .compute_used
        }}%'
      evaluationInterval: 30s
      name: GPUTFlopsFull
      query: |
        SELECT
          node,
          pool,
          uuid,
          avg(compute_percentage) AS compute_used
        FROM tf_gpu_usage
        WHERE compute_percentage > {{ .Threshold }} AND {{ .Conditions }}
        GROUP BY node, pool, uuid
      severity: P1
      summary: GPU TFlops Full, used {{ .compute_used }}% on {{ .node }} {{ .uuid }}
      threshold: 97
    - alertTargetInstance: '{{ .uuid }}'
      consecutiveCount: 3
      description: 'GPU {{ .uuid }} from Node {{ .node }} has temperature above {{ .Threshold
        }}°C, Average temperature: {{ .avg_temperature }}, GPU Pool: {{ .pool }}'
      evaluationInterval: 30s
      name: GPUTemperatureHigh
      query: |
        SELECT
          node,
          pool,
          uuid,
          avg(temperature) AS avg_temperature
        FROM tf_gpu_usage
        WHERE temperature > {{ .Threshold }} AND {{ .Conditions }}
        GROUP BY node, pool, uuid
      runbookURL: https://tensor-fusion.ai/guide/troubleshooting/handbook
      severity: P1
      summary: GPU Temperature High, {{ .avg_temperature }}°C on {{ .node }} {{ .uuid
        }}
      threshold: 90
    - alertTargetInstance: '{{ .node }}'
      consecutiveCount: 2
      description: Node {{ .node }} in Pool {{ .pool }} has available TFlops below {{
        .Threshold }}%
      evaluationInterval: 1m
      name: NodeTFlopsAllocationCritical
      query: |
        SELECT node, pool, (100 - avg(allocated_tflops_percent)) as tflops_available
        FROM tf_node_metrics
        WHERE {{ .Conditions }}
        GROUP BY node, pool
        HAVING tflops_available < {{ .Threshold }}
      severity: P0
      summary: Available TFlops below threshold, remaining {{ .tflops_available }}% for
        {{ .node }}
      threshold: 5
    - alertTargetInstance: '{{ .node }}'
      consecutiveCount: 2
      description: Node {{ .node }} in Pool {{ .pool }} has available TFlops below {{
        .Threshold }}%
      evaluationInterval: 1m
      name: NodeTFlopsAllocationWarning
      query: |
        SELECT node, pool, (100 - avg(allocated_tflops_percent)) as tflops_available
        FROM tf_node_metrics
        WHERE {{ .Conditions }}
        GROUP BY node, pool
        HAVING tflops_available < {{ .Threshold }}
      severity: P1
      summary: Node available TFlops below threshold, remaining {{ .tflops_available }}%
        for {{ .node }}
      threshold: 10
    - alertTargetInstance: '{{ .pool }}'
      consecutiveCount: 2
      description: Pool {{ .pool }} has available TFlops below {{ .Threshold }}%
      evaluationInterval: 1m
      name: PoolTotalTFlopsAllocationCritical
      query: |
        SELECT pool, (100 - avg(allocated_tflops_percent)) as tflops_available
        FROM tf_node_metrics
        WHERE {{ .Conditions }}
        GROUP BY pool
        HAVING tflops_available < {{ .Threshold }}
      severity: P0
      summary: Pool available TFlops below threshold, remaining {{ .tflops_available }}%
      threshold: 5
    - alertTargetInstance: '{{ .pool }}'
      consecutiveCount: 2
      description: Pool {{ .pool }} has available TFlops below {{ .Threshold }}%
      evaluationInterval: 1m
      name: PoolTotalTFlopsAllocationWarning
      query: |
        SELECT pool, (100 - avg(allocated_tflops_percent)) as tflops_available
        FROM tf_node_metrics
        WHERE {{ .Conditions }}
        GROUP BY pool
        HAVING tflops_available < {{ .Threshold }}
      severity: P1
      summary: Pool available TFlops below threshold, remaining {{ .tflops_available }}%
      threshold: 10
    - alertTargetInstance: '{{ .node }}'
      consecutiveCount: 2
      description: Node {{ .node }} in Pool {{ .pool }} has available VRAM below {{ .Threshold
        }}%
      evaluationInterval: 1m
      name: NodeVRAMAllocationCritical
      query: |
        SELECT node, pool, (100 - avg(allocated_vram_percent)) as vram_available
        FROM tf_node_metrics
        WHERE {{ .Conditions }}
        GROUP BY node, pool
        HAVING vram_available < {{ .Threshold }}
      severity: P1
      summary: Node available VRAM below threshold, remaining {{ .vram_available }}% for
        {{ .node }}
      threshold: 5
    - alertTargetInstance: '{{ .node }}'
      consecutiveCount: 2
      description: Node {{ .node }} in Pool {{ .pool }} has available VRAM below {{ .Threshold
        }}%
      evaluationInterval: 1m
      name: NodeVRAMAllocationWarning
      query: |
        SELECT node, pool, (100 - avg(allocated_vram_percent)) as vram_available
        FROM tf_node_metrics
        WHERE {{ .Conditions }}
        GROUP BY node, pool
        HAVING vram_available < {{ .Threshold }}
      severity: P1
      summary: Node available VRAM below threshold, remaining {{ .vram_available }}% for
        {{ .node }}
      threshold: 10
    - alertTargetInstance: '{{ .pool }}'
      consecutiveCount: 2
      description: Pool {{ .pool }} has available VRAM below {{ .Threshold }}%
      evaluationInterval: 1m
      name: PoolVRAMAllocationWarning
      query: |
        SELECT pool, (100 - avg(allocated_vram_percent)) as vram_available
        FROM tf_node_metrics
        WHERE {{ .Conditions }}
        GROUP BY pool
        HAVING vram_available < {{ .Threshold }}
      severity: P1
      summary: Pool available VRAM below threshold, remaining {{ .vram_available }}% for
        {{ .pool }}
      threshold: 10
    - alertTargetInstance: '{{ .node }}'
      consecutiveCount: 2
      description: GPU Node {{ .node }} has no workload running, should be decommissioned
      evaluationInterval: 5m
      name: EmptyGPU
      query: "SELECT DISTINCT node \nFROM tf_node_metrics \nWHERE {{ .Conditions }} AND
        node NOT IN (\n    SELECT DISTINCT node \n    FROM tf_worker_usage \n    WHERE
        {{ .Conditions }}\n)\n"
      severity: P2
      summary: Empty GPU without any workload, Node {{ .node }}
      threshold: 0
    - alertTargetInstance: '{{ .uuid }}'
      consecutiveCount: 3
      description: 'GPU {{ .uuid }} on Node {{ .node }} in Pool {{ .pool }} has been idle
        for 3 consecutive 10m, compute: {{ .compute }}, vram: {{ .vram }}'
      evaluationInterval: 10m
      name: IdleGPU
      query: |
        SELECT node, pool, uuid, avg(compute_percentage) as compute, avg(memory_percentage) vram
        FROM tf_gpu_usage
        WHERE {{ .Conditions }}
        GROUP BY node, pool, uuid
        HAVING compute < 1 and vram < {{ .Threshold }};
      severity: P2
      summary: 'Idle GPU found: {{ .uuid }} on Node {{ .node }}'
      threshold: 5
    metricsExtraPodLabels: {}
    metricsFormat: influx
    metricsTTL: 30d
  scheduler-config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    clientConnection:
      burst: 100
      kubeconfig: ""
      qps: 50
    kind: KubeSchedulerConfiguration
    profiles:
    - pluginConfig:
      - args:
          maxWorkerPerNode: 256
          tflopsWeight: 0.3
          vramWeight: 0.7
        name: GPUResourcesFit
      - args:
          totalIntranetBandWidthGBps: 100
        name: GPUNetworkTopologyAware
      - args:
          scoringStrategy:
            requestedToCapacityRatio:
              shape:
              - score: 0
                utilization: 0
              - score: 9
                utilization: 75
              - score: 10
                utilization: 100
            resources:
            - name: cpu
              weight: 1
            - name: memory
              weight: 1
            - name: nvidia.com/gpu
              weight: 5
            type: RequestedToCapacityRatio
        name: NodeResourcesFit
      plugins:
        filter:
          enabled:
          - name: GPUResourcesFit
          - name: GPUNetworkTopologyAware
        postBind:
          enabled:
          - name: GPUResourcesFit
        preFilter:
          enabled:
          - name: GPUResourcesFit
        reserve:
          enabled:
          - name: GPUResourcesFit
        score:
          enabled:
          - name: GPUResourcesFit
            weight: 5
      schedulerName: tensor-fusion-scheduler

              is not guaranteed. VRAM will cool down into NVMe with the shortest threshold
              and include requested value. This is perfect for training and fine-tuning
              jobs, hands-on labs, etc. It serves with best effort.
            name: low
            priority: 10
          - description: Ensure 100% of the requested capacity. Allow bursts to limits
              and preempt low QoS tasks. Latency is not guaranteed. This is perfect
              for offline business tasks like embedding. VRAM will cool down into
              NVMe with a shorter threshold, include requested value
            name: medium
            priority: 30
          - description: Ensure 100% of the requested capacity, burst to limits, and
              preempt medium QoS tasks. This is perfect for online businesses like
              inference but not for latency-critical services. Examples include grammar
              checks, non-latency-sensitive chat, image or video generation, and one-time
              translations. VRAM will not cool down below the requested value.
            name: high
            priority: 60

{{- /*
  tensor-os plan 31 / R2-BE3 — vector aggregator config.

  Architecture:
   - File sources (`metrics`) emit log events containing InfluxDB-line
     payload our hypervisor / operator already write; they route through
     the http sink raw.
   - prometheus_scrape sources emit *metric* events (`.name`, `.tags`,
     `.counter|.gauge|.histogram|.summary`). Metric events can NOT be
     reshaped into log-shape `.measurement / .fields` and then encoded
     with `codec: text` (R1 attempt → no-ops). We instead:
       * keep the events as metrics
       * apply a `remap` transform that filters `.tags` against the
         whitelist and stamps `cluster_id` / `node` — VRL on metric
         events supports `.tags` directly.
       * sink them via `sinks.influxdb_metrics_v2`, Vector's native
         InfluxDB-line writer for metric events. Greptime exposes an
         InfluxDB v2 write endpoint at `/v1/influxdb/api/v2/write` that
         this sink talks to natively.
*/}}
{{- $mon := .Values.monitoring | default dict -}}
{{- $scrapes := $mon.scrapes | default dict -}}
{{- $ds := $mon.dynamicScrapes | default dict -}}
{{- $anyScrape := or (or (or (or
      (and $scrapes.nodeExporter $scrapes.nodeExporter.enabled)
      (and $scrapes.kubeStateMetrics $scrapes.kubeStateMetrics.enabled))
      (and $scrapes.cadvisor $scrapes.cadvisor.enabled))
      (and $scrapes.kubeApiserver $scrapes.kubeApiserver.enabled))
      (and $scrapes.tensorOsServer $scrapes.tensorOsServer.enabled) -}}
{{- $whitelist := list -}}
{{- if and $mon.labelWhitelist $mon.labelWhitelist.common }}{{ $whitelist = concat $whitelist $mon.labelWhitelist.common }}{{ end -}}
{{- if and $mon.labelWhitelist $mon.labelWhitelist.kubeState }}{{ $whitelist = concat $whitelist $mon.labelWhitelist.kubeState }}{{ end -}}
{{- if and $mon.labelWhitelist $mon.labelWhitelist.cadvisor }}{{ $whitelist = concat $whitelist $mon.labelWhitelist.cadvisor }}{{ end -}}
{{- if and $mon.labelWhitelist $mon.labelWhitelist.apiserver }}{{ $whitelist = concat $whitelist $mon.labelWhitelist.apiserver }}{{ end -}}
{{- $whitelistJson := $whitelist | uniq | toJson -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: tensor-fusion-sys-vector-config
  namespace: {{ include "tensor-fusion.namespace" . }}
data:
  vector-operator.yaml: |
    api:
      enabled: true
    sources:
      metrics:
        type: file
        data_dir: /logs
        include:
          - /logs/metrics*.log

      kubernetes_logs:
        type: kubernetes_logs
        self_node_name: "${NODE_NAME}"
        extra_label_selector: "tensor-fusion.ai/component in (operator)"
      {{- if and $scrapes.kubeStateMetrics $scrapes.kubeStateMetrics.enabled }}
      scrape_ksm:
        type: prometheus_scrape
        endpoints: ["{{ $scrapes.kubeStateMetrics.endpoint }}"]
        scrape_interval_secs: {{ $scrapes.kubeStateMetrics.intervalSecs | default 30 }}
      {{- end }}
      {{- if and $scrapes.kubeApiserver $scrapes.kubeApiserver.enabled }}
      scrape_apiserver:
        type: prometheus_scrape
        endpoints: ["{{ $scrapes.kubeApiserver.endpoint }}"]
        scrape_interval_secs: {{ $scrapes.kubeApiserver.intervalSecs | default 30 }}
        {{- if $scrapes.kubeApiserver.tlsSkipVerify }}
        tls:
          verify_certificate: false
        {{- else }}
        tls:
          verify_certificate: true
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        {{- end }}
        {{- if $scrapes.kubeApiserver.authBearerTokenFile }}
        auth:
          strategy: bearer
          token_file: "{{ $scrapes.kubeApiserver.authBearerTokenFile }}"
        {{- end }}
      {{- end }}
      {{- if and $scrapes.tensorOsServer $scrapes.tensorOsServer.enabled }}
      scrape_tos_server:
        type: prometheus_scrape
        endpoints: ["{{ $scrapes.tensorOsServer.endpoint }}"]
        scrape_interval_secs: {{ $scrapes.tensorOsServer.intervalSecs | default 15 }}
      {{- end }}

    transforms:
      prepare_kubernetes_logs:
        type: remap
        inputs:
          - kubernetes_logs
        source: |
          .message = .message
          .container = .kubernetes.container_name
          .pod = .kubernetes.pod_name
          .namespace = .kubernetes.pod_namespace
          .component = .kubernetes.pod_labels."tensor-fusion.ai/component"
          del(.kubernetes)
          del(.file)
          del(.source_type)
      {{- if $anyScrape }}
      prom_tags:
        # R2-BE3: VRL on *metric* events. We only filter / stamp tags;
        # the event shape (counter / gauge / etc.) stays intact so the
        # downstream influxdb_metrics sink can serialize it correctly.
        type: remap
        inputs:
          - scrape_*
        source: |
          whitelist = {{ $whitelistJson }}
          # `.tags` is the metric label map. `del()` requires a known
          # key, so we iterate by enumerating and dropping non-whitelisted
          # entries.
          tags = object!(.tags || {})
          for_each(tags) -> |k, _v| {
            if !includes(whitelist, k) {
              tags = remove!(tags, [k])
            }
          }
          tags.cluster_id = string(tags.cluster_id || "{{ .Release.Name }}")
          tags.collected_by = "vector"
          .tags = tags
      {{- end }}
    sinks:
      sink_greptimedb_operator_metrics:
        type: http
        inputs:
          - metrics
        method: post
        encoding:
          codec: text
        {{- if ne .Values.greptime.isCloud true }}
        uri: "http://{{ .Values.greptime.host }}:4000/v1/influxdb/api/v2/write?db=public&precision=ms"
        {{- else }}
        uri: "https://{{ .Values.greptime.host }}/v1/influxdb/api/v2/write?db={{ .Values.greptime.db }}&precision=ms"
        request:
          headers:
            # refer https://docs.greptime.com/user-guide/protocols/http/#post-influxdb-line-protocol-data
            Authorization: "token {{ .Values.greptime.user }}:{{ .Values.greptime.password }}"
        {{- end }}
      {{- if $anyScrape }}
      sink_greptimedb_operator_prom_metrics:
        # R2-BE3: native InfluxDB-v2 line writer for metric events.
        # Greptime accepts InfluxDB v2 line protocol on the same write
        # endpoint as our file-sourced metrics.
        type: influxdb_metrics
        inputs:
          - prom_tags
        {{- if ne .Values.greptime.isCloud true }}
        endpoint: "http://{{ .Values.greptime.host }}:4000"
        bucket: public
        org: ""
        token: ""
        {{- else }}
        endpoint: "https://{{ .Values.greptime.host }}"
        bucket: "{{ .Values.greptime.db }}"
        org: ""
        token: "{{ .Values.greptime.user }}:{{ .Values.greptime.password }}"
        {{- end }}
      {{- end }}

      sink_greptimedb_operator_logs:
        type: greptimedb_logs
        compression: gzip
        table: tf_system_log
        inputs:
          - prepare_kubernetes_logs
        {{- if ne .Values.greptime.isCloud true }}
        endpoint: http://{{ .Values.greptime.host }}:4000
        dbname: public
        {{- else }}
        endpoint: https://{{ .Values.greptime.host }}
        dbname: {{ .Values.greptime.db }}
        username: {{ .Values.greptime.user }}
        password: {{ .Values.greptime.password }}
        {{- end }}

  vector-hypervisor.yaml: |
    api:
      enabled: true

    sources:
      kubernetes_logs:
        type: kubernetes_logs
        self_node_name: "${NODE_NAME}"
        extra_label_selector: "tensor-fusion.ai/component in (hypervisor,worker)"
      metrics:
        type: file
        data_dir: /logs
        include:
          - /logs/metrics.log.*
      {{- if and $scrapes.nodeExporter $scrapes.nodeExporter.enabled }}
      scrape_node_exporter:
        type: prometheus_scrape
        endpoints: ["{{ $scrapes.nodeExporter.endpoint }}"]
        scrape_interval_secs: {{ $scrapes.nodeExporter.intervalSecs | default 15 }}
      {{- end }}
      {{- if and $scrapes.cadvisor $scrapes.cadvisor.enabled }}
      scrape_cadvisor:
        type: prometheus_scrape
        endpoints: ["{{ $scrapes.cadvisor.endpoint }}"]
        scrape_interval_secs: {{ $scrapes.cadvisor.intervalSecs | default 15 }}
        {{- if $scrapes.cadvisor.tlsSkipVerify }}
        tls:
          verify_certificate: false
        {{- else }}
        tls:
          verify_certificate: true
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        {{- end }}
        {{- if $scrapes.cadvisor.authBearerTokenFile }}
        auth:
          strategy: bearer
          token_file: "{{ $scrapes.cadvisor.authBearerTokenFile }}"
        {{- end }}
      {{- end }}

    transforms:
      prepare_kubernetes_logs:
        type: remap
        inputs:
          - kubernetes_logs
        source: |
          .message = .message
          .container = .kubernetes.container_name
          .pod = .kubernetes.pod_name
          .namespace = .kubernetes.pod_namespace
          .component = .kubernetes.pod_labels."tensor-fusion.ai/component"
          del(.kubernetes)
          del(.file)
          del(.source_type)
      {{- if $anyScrape }}
      prom_tags:
        type: remap
        inputs:
          - scrape_*
        source: |
          whitelist = {{ $whitelistJson }}
          tags = object!(.tags || {})
          for_each(tags) -> |k, _v| {
            if !includes(whitelist, k) {
              tags = remove!(tags, [k])
            }
          }
          tags.cluster_id = string(tags.cluster_id || "{{ .Release.Name }}")
          tags.node = string(tags.node || "${NODE_NAME}")
          tags.collected_by = "vector"
          .tags = tags
      {{- end }}

    sinks:
      sink_greptimedb_hypervisor_metrics:
        type: http
        inputs:
          - metrics
        method: post
        encoding:
          codec: text
        {{- if ne .Values.greptime.isCloud true }}
        uri: "http://{{ .Values.greptime.host }}:4000/v1/influxdb/api/v2/write?db=public&precision=ms"
        {{- else }}
        uri: "https://{{ .Values.greptime.host }}/v1/influxdb/api/v2/write?db={{ .Values.greptime.db }}&precision=ms"
        request:
          headers:
            # refer https://docs.greptime.com/user-guide/protocols/http/#post-influxdb-line-protocol-data
            Authorization: "token {{ .Values.greptime.user }}:{{ .Values.greptime.password }}"
        {{- end }}
      {{- if $anyScrape }}
      sink_greptimedb_hypervisor_prom_metrics:
        type: influxdb_metrics
        inputs:
          - prom_tags
        {{- if ne .Values.greptime.isCloud true }}
        endpoint: "http://{{ .Values.greptime.host }}:4000"
        bucket: public
        org: ""
        token: ""
        {{- else }}
        endpoint: "https://{{ .Values.greptime.host }}"
        bucket: "{{ .Values.greptime.db }}"
        org: ""
        token: "{{ .Values.greptime.user }}:{{ .Values.greptime.password }}"
        {{- end }}
      {{- end }}

      sink_greptimedb_hypervisor_worker_logs:
        type: greptimedb_logs
        compression: gzip
        table: tf_system_log
        inputs:
          - prepare_kubernetes_logs
        {{- if ne .Values.greptime.isCloud true }}
        endpoint: http://{{ .Values.greptime.host }}:4000
        dbname: public
        {{- else }}
        endpoint: https://{{ .Values.greptime.host }}
        dbname: {{ .Values.greptime.db }}
        username: {{ .Values.greptime.user }}
        password: {{ .Values.greptime.password }}
        {{- end }}

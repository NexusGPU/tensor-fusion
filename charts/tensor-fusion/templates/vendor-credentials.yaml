{{- $ns := include "tensor-fusion.namespace" . -}}
{{- if not (lookup "v1" "Secret" $ns "tf-cloud-vendor-credentials") }}
apiVersion: v1
kind: Secret
metadata:
  name: tf-cloud-vendor-credentials
  namespace: {{ $ns }}
  annotations:
    helm.sh/resource-policy: keep
data:
  ak: "{{ .Values.cloudVendorCredentials.accessKey | b64enc }}"
  sk: "{{ .Values.cloudVendorCredentials.secretKey | b64enc }}"
{{- end }}
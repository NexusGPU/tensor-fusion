      # ---- Non-MIG cards (catalog only, no partitionTemplateRefs) ----
      - model: A10
        fullModelName: "NVIDIA A10"
        costPerHour: "0.60"
        fp16TFlops: "125"
      - model: A40
        fullModelName: "NVIDIA A40-PCIE-48GB"
        costPerHour: "1.10"
        fp16TFlops: "149.7"
      - model: L4
        fullModelName: "NVIDIA L4"
        costPerHour: "0.55"
        fp16TFlops: "121"
      - model: L40
        fullModelName: "NVIDIA L40"
        costPerHour: "1.20"
        fp16TFlops: "362"
      - model: L40S
        fullModelName: "NVIDIA L40S"
        costPerHour: "1.40"
        fp16TFlops: "366"
      - model: T4
        fullModelName: "Tesla T4"
        costPerHour: "0.35"
        fp16TFlops: "65"
      - model: RTX4090
        fullModelName: "NVIDIA GeForce RTX 4090"
        costPerHour: "0.30"
        fp16TFlops: "165.16"

    # =============================================================================
    # virtualizationTemplates
    #
    # Field semantics:
    #   - `id`            : chart-side unique key (referenced by partitionTemplateRefs).
    #   - `nvmlProfileId` : integer NVIDIA NVML GI Profile ID — actually forwarded
    #                       to vgpu-provider → NVML. The resolver returns this
    #                       (as decimal string) instead of `id` when set.
    #   - `name`          : friendly profile name a user puts in pod annotation
    #                       `tensor-fusion.ai/partition` (e.g., "1g.10gb"). Matches
    #                       canonically — "1g.10gb" / "mig-1g.10gb" / "mig-1g-10gb"
    #                       all hit the same template.
    #
    # `id` naming convention:  nv-<family>-<profile>[-me]
    #
    #   <family>  Which physical card this template targets, tagged by the full-GPU
    #             memory size. Same compute slicing but different memory variants
    #             share a family. Current families:
    #               80g  → A100 80GB / A800 80GB / H100 80GB / H800 80GB
    #                      (7-slice MIG; 1g profile = 10GB each)
    #               40g  → A100 40GB / A800 40GB
    #                      (7-slice MIG; 1g profile = 5GB each)
    #               a30  → A30 24GB
    #                      (4-slice MIG; different NVML id table & computePercent)
    #
    #             Future additions: `h100-94g`, `h200`, `b200`, `pro-blackwell`
    #             once authoritative `nvidia-smi mig -lgip` placement data is in.
    #
    #   <profile> canonical MIG shorthand `NgSlice-Mgb`, dashes replace dots so
    #             ids stay DNS-1123 friendly (k8s-safe). Example: "1g.10gb" →
    #             "1g-10gb". The dotted form is kept in `name`.
    #
    #   -me       optional suffix for the "+me" media-extension variant. Singleton:
    #             only one +me instance per GPU at a time.
    #
    # Examples (and their physical NVML profile id):
    #   nv-80g-1g-10gb       = "1g.10gb"    on A100/H100 80GB  (NVML id 19)
    #   nv-80g-1g-10gb-me    = "1g.10gb+me" on A100/H100 80GB  (NVML id 20, singleton)
    #   nv-80g-1g-20gb       = "1g.20gb"    on A100/H100 80GB  (NVML id 15, double-mem)
    #   nv-40g-1g-5gb        = "1g.5gb"     on A100 40GB       (NVML id 19)
    #   nv-40g-1g-10gb       = "1g.10gb"    on A100 40GB       (NVML id 15, double-mem)
    #   nv-a30-2g-12gb       = "2g.12gb"    on A30             (NVML id 5)
    #
    # Note: NVML profile ids collide between architectures (id=14 is 1g.6gb on
    # A30 but 2g.20gb on A100/H100) — this is intentional in NVIDIA's API and is
    # exactly why we keep chart-side `id` distinct from `nvmlProfileId`.
    # placement / computePercent values come from `nvidia-smi mig -lgip`.
    # =============================================================================
    virtualizationTemplates:
      # ===== A100/A800/H100/H800 80GB family (7-slice) =====
      - id: nv-80g-1g-10gb
        nvmlProfileId: 19
        name: "1g.10gb"
        memoryGigabytes: 10
        computePercent: "14.2857"
        description: "1/7 GPU slice with 10GB memory (A100/H100 80GB)"
        maxInstances: 7
        placementLimit: [0, 1, 2, 3, 4, 5, 6]
        placementOffset: 1
        isolationGroupSharing: exclusive
      - id: nv-80g-1g-10gb-me
        nvmlProfileId: 20
        name: "1g.10gb+me"
        memoryGigabytes: 10
        computePercent: "14.2857"
        description: "1g slice + media engine (singleton; +1 JPEG + 1 OFA)"
        maxInstances: 1
        placementLimit: [0, 1, 2, 3, 4, 5, 6]
        placementOffset: 1
        isolationGroupSharing: exclusive
      - id: nv-80g-1g-20gb
        nvmlProfileId: 15
        name: "1g.20gb"
        memoryGigabytes: 20
        computePercent: "14.2857"
        description: "1g slice with double memory (A100/H100 80GB)"
        maxInstances: 4
        placementLimit: [0, 2, 4, 6]
        placementOffset: 2
        isolationGroupSharing: exclusive
      - id: nv-80g-2g-20gb
        nvmlProfileId: 14
        name: "2g.20gb"
        memoryGigabytes: 20
        computePercent: "28.5714"
        description: "2/7 GPU slice with 20GB memory (A100/H100 80GB)"
        maxInstances: 3
        placementLimit: [0, 2, 4]
        placementOffset: 2
        isolationGroupSharing: exclusive
      - id: nv-80g-3g-40gb
        nvmlProfileId: 9
        name: "3g.40gb"
        memoryGigabytes: 40
        computePercent: "42.8571"
        description: "3/7 GPU slice with 40GB memory (A100/H100 80GB)"
        maxInstances: 2
        placementLimit: [0, 4]
        placementOffset: 4
        isolationGroupSharing: exclusive
      - id: nv-80g-4g-40gb
        nvmlProfileId: 5
        name: "4g.40gb"
        memoryGigabytes: 40
        computePercent: "57.1428"
        description: "4/7 GPU slice with 40GB memory (A100/H100 80GB)"
        maxInstances: 1
        placementLimit: [0]
        placementOffset: 4
        isolationGroupSharing: exclusive
      - id: nv-80g-7g-80gb
        nvmlProfileId: 0
        name: "7g.80gb"
        memoryGigabytes: 80
        computePercent: "100"
        description: "Full GPU with 80GB memory (A100/H100 80GB)"
        maxInstances: 1
        placementLimit: [0]
        placementOffset: 8
        isolationGroupSharing: exclusive

      # ===== A100/A800 40GB family (7-slice) =====
      # NVML ids are reused (15/19 swap meaning vs 80GB), but each card resolves
      # via its own partitionTemplateRefs, so no collision.
      - id: nv-40g-1g-5gb
        nvmlProfileId: 19
        name: "1g.5gb"
        memoryGigabytes: 5
        computePercent: "14.2857"
        description: "1/7 GPU slice with 5GB memory (A100 40GB)"
        maxInstances: 7
        placementLimit: [0, 1, 2, 3, 4, 5, 6]
        placementOffset: 1
        isolationGroupSharing: exclusive
      - id: nv-40g-1g-5gb-me
        nvmlProfileId: 20
        name: "1g.5gb+me"
        memoryGigabytes: 5
        computePercent: "14.2857"
        description: "1g.5gb + media engine (singleton)"
        maxInstances: 1
        placementLimit: [0, 1, 2, 3, 4, 5, 6]
        placementOffset: 1
        isolationGroupSharing: exclusive
      - id: nv-40g-1g-10gb
        nvmlProfileId: 15
        name: "1g.10gb"
        memoryGigabytes: 10
        computePercent: "14.2857"
        description: "1g slice with double memory (A100 40GB; same compute as 1g.5gb)"
        maxInstances: 4
        placementLimit: [0, 2, 4, 6]
        placementOffset: 2
        isolationGroupSharing: exclusive
      - id: nv-40g-2g-10gb
        nvmlProfileId: 14
        name: "2g.10gb"
        memoryGigabytes: 10
        computePercent: "28.5714"
        description: "2/7 GPU slice with 10GB memory (A100 40GB)"
        maxInstances: 3
        placementLimit: [0, 2, 4]
        placementOffset: 2
        isolationGroupSharing: exclusive
      - id: nv-40g-3g-20gb
        nvmlProfileId: 9
        name: "3g.20gb"
        memoryGigabytes: 20
        computePercent: "42.8571"
        description: "3/7 GPU slice with 20GB memory (A100 40GB)"
        maxInstances: 2
        placementLimit: [0, 4]
        placementOffset: 4
        isolationGroupSharing: exclusive
      - id: nv-40g-4g-20gb
        nvmlProfileId: 5
        name: "4g.20gb"
        memoryGigabytes: 20
        computePercent: "57.1428"
        description: "4/7 GPU slice with 20GB memory (A100 40GB)"
        maxInstances: 1
        placementLimit: [0]
        placementOffset: 4
        isolationGroupSharing: exclusive
      - id: nv-40g-7g-40gb
        nvmlProfileId: 0
        name: "7g.40gb"
        memoryGigabytes: 40
        computePercent: "100"
        description: "Full GPU with 40GB memory (A100 40GB)"
        maxInstances: 1
        placementLimit: [0]
        placementOffset: 8
        isolationGroupSharing: exclusive

      # ===== A30 (4-slice) =====
      # Different NVML id table from 7-slice family; different computePercent
      # (25 / 50 / 100 instead of 14.2857 / 28.5714 / ...).
      - id: nv-a30-1g-6gb
        nvmlProfileId: 14
        name: "1g.6gb"
        memoryGigabytes: 6
        computePercent: "25"
        description: "1/4 NPU slice with 6GB memory (A30)"
        maxInstances: 4
        placementLimit: [0, 1, 2, 3]
        placementOffset: 1
        isolationGroupSharing: exclusive
      - id: nv-a30-2g-12gb
        nvmlProfileId: 5
        name: "2g.12gb"
        memoryGigabytes: 12
        computePercent: "50"
        description: "2/4 NPU slice with 12GB memory (A30)"
        maxInstances: 2
        placementLimit: [0, 2]
        placementOffset: 2
        isolationGroupSharing: exclusive
      - id: nv-a30-4g-24gb
        nvmlProfileId: 0
        name: "4g.24gb"
        memoryGigabytes: 24
        computePercent: "100"
        description: "Full A30 GPU with 24GB memory"
        maxInstances: 1
        placementLimit: [0]
        placementOffset: 4
        isolationGroupSharing: exclusive

    # NVIDIA_MIG_CONFIG_DEVICES / NVIDIA_MIG_MONITOR_DEVICES are required on
    # MIG-enabled nodes: the NVIDIA Container Runtime only injects the per-GI
    # capability files under /proc/driver/nvidia/capabilities/ when these are set,
    # otherwise the hypervisor may fail to start on a MIG node and NVML MIG
    # (GpuInstance / ComputeInstance) queries fail. The operator also auto-injects
    # them when privilegedHypervisor=true, but they are set explicitly here so MIG
    # support does not silently depend on that path.
    # (TF_ENABLE_LOG / TF_LOG_LEVEL=debug are intentionally omitted — debug only.)
    extraEnv:
      - name: NVIDIA_MIG_CONFIG_DEVICES
        value: all
      - name: NVIDIA_MIG_MONITOR_DEVICES
        value: all
    # Optional device mount policy for the hypervisor (spec.hypervisor.deviceMount).
    # Empty ({}) = builtin default device mounting, which is correct for almost all
    # clusters. Only set this for special setups that need to filter/override which
    # device nodes the hypervisor mounts (CEL rules). Fields:
    #   deviceMountRule / partitionedDeviceMountRule (CEL expressions), sharedDevices ([]).
    # Example:
    #   deviceMount:
    #     deviceMountRule: "false"      # mount none of the base device nodes
    #     sharedDevices: []
    deviceMount: {}

# Optional, opt-in default TensorFusionCluster (+ its SchedulingConfigTemplate)
# created by the chart so a fresh `helm install` is usable out of the box with a
# single NVIDIA shared GPU pool. Both CRs carry helm.sh/resource-policy: keep, so
# uninstalling the chart will NOT delete the cluster or its pools.
# Disable this if you manage TensorFusionCluster / SchedulingConfigTemplate
# out-of-band (kubectl apply).
cluster:
  enabled: true
  name: tensor-fusion
  # Hypervisor image is NOT part of ProviderConfig — it can only be set on the
  # pool, so it lives here. Client / worker images are NOT repeated: they come
  # from providerConfigs.nvidia.images.remoteClient / remoteWorker (single source).
  hypervisorImage: tensorfusion/tensor-fusion-hypervisor:latest
  schedulingConfigTemplateName: tf-scheduling-config
  pool:
    name: shared
    # GPU node label the default pool selects on.
    nodeSelectorKey: nvidia.com/gpu.present
    capacityConfig:
      maxResources:
        tflops: "100"
        vram: "100Gi"
      minResources:
        tflops: "20"
        vram: "10Gi"
      warmResources:
        tflops: "10"
        vram: "5Gi"
      oversubscription:
        tflopsOversellRatio: 2000
        vramExpandToHostDisk: 60
        vramExpandToHostMem: 50

alert:
  enabled: true
  image:
    repository: quay.io/prometheus/alertmanager
    tag: v0.28.1
  replicaCount: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 50m
    limits:
      memory: 1Gi
      cpu: 1500m
  persistence:
    enabled: false
    # storageClass: "gp3"
    # size: 10Gi
  alertManagerConfig:
    global: {}
    receivers:
    - name: default-receiver
    route:
      group_interval: 5m
      group_wait: 10s
      receiver: default-receiver
      repeat_interval: 3h
    templates:
    - /etc/alertmanager/*.tmpl

schedulerConfig:
  apiVersion: kubescheduler.config.k8s.io/v1
  kind: KubeSchedulerConfiguration
  clientConnection:
    kubeconfig: ""
    qps: 1000
    burst: 2000
  profiles:
  # Refer: https://kubernetes.io/docs/reference/scheduling/config/
  - schedulerName: tensor-fusion-scheduler
    plugins:
      preEnqueue:
        enabled:
        - name: GPUResourcesFit
      preFilter:
        enabled:
        - name: GPUResourcesFit
        - name: GPUNetworkTopologyAware
      filter:
        enabled:
        - name: GPUResourcesFit
        - name: GPUNetworkTopologyAware
      score:
        enabled:
        - name: GPUResourcesFit
          weight: 5
        - name: GPUNetworkTopologyAware
          weight: 3
      postFilter:
        # Only GPUResourcesFit is listed here. DefaultPreemption stays enabled
        # through the scheduler's default MultiPoint plugin set.
        # During MultiPoint expansion, MultiPoint-only plugins are placed before
        # regular-only plugins for the same extension point. Because
        # DefaultPreemption is MultiPoint-only here and GPUResourcesFit is
        # regular-only, the effective order is [DefaultPreemption,
        # GPUResourcesFit]. PostFilter stops on the first non-Unschedulable
        # result, so preemption gets to rescue the pod before GPUResourcesFit
        # strict-fails the gang.
        enabled:
        - name: GPUResourcesFit
      reserve:
        enabled:
        - name: GPUResourcesFit
      permit:
        enabled:
        - name: GPUResourcesFit
      preBind:
        enabled:
        - name: GPUResourcesFit
      postBind:
        enabled:
        - name: GPUResourcesFit
    pluginConfig:
    - name: GPUResourcesFit
      args:
        maxWorkerPerNode: 256
        vramWeight: 0.7
        tflopsWeight: 0.3
    - name: GPUNetworkTopologyAware
      args:
        # Topology enforcement mode:
        #   soft (default) — only score; never reject a node
        #   hard           — reject nodes whose best combination exceeds maxAllowedTier
        # NOTE: this `mode` is the scheduler plugin mode, unrelated to Pod IsolationMode
        # (shared / soft / hard / partitioned).
        mode: soft
        # Topology data source:
        #   auto (default) — prefer vendor topology (GPU.status.topology.peers[].tier),
        #                    fall back to NUMA when vendor data is missing
        #   numa           — force NUMA-only evaluation
        #   vendor         — force vendor interconnect topology
        topologySource: auto
        # Tier ceiling for "acceptable" GPU combinations (lower = closer / better):
        #   0 = same NVLink group, 1 = same NUMA, 2 = cross NUMA, 3 = unknown
        maxAllowedTier: 1
        # When a GPU has no topology data, treat it as the worst tier (still scorable
        # in soft mode) or reject it outright in hard mode.
        unknownTopologyPolicy: treat-as-worst
        # Single-GPU requests prefer GPUs that won't break existing high-quality
        # NVLink / NUMA groups (helps preserve future multi-GPU allocations).
        preferLeastDamage: true
    - name: NodeResourcesFit
      args:
        ignoredResourceGroups:
          - "tensor-fusion.ai"
        scoringStrategy:
          resources:
          - name: cpu
            weight: 1
          - name: memory
            weight: 1
          - name: nvidia.com/gpu
            weight: 5
          requestedToCapacityRatio:
            shape:
            - utilization: 0
              score: 0
            - utilization: 75
              score: 9
            - utilization: 100
              score: 10
          type: RequestedToCapacityRatio

# KV structure config for other global configs
dynamicConfig:
  # retention period for metrics data
  metricsTTL: 30d
  metricsFormat: influx
  # extra pod labels to be added to metrics, 
  # you can map label keys to other measure tags
  metricsExtraPodLabels: {}
  preemptClusterWideFromEnv: true
  # alert rules
  alertRules:    
    # Worker TFlops throttled alert
    - name: WorkerTFlopsThrottled
      query: |
        SELECT workload, worker, uuid, node, MAX(compute_throttled_cnt)-MIN(compute_throttled_cnt) as throttled_increase
        FROM tf_worker_usage
        WHERE {{ .Conditions }}
        GROUP BY workload, worker, uuid, node
        HAVING throttled_increase > {{ .Threshold }}
      threshold: 0
      evaluationInterval: 15s
      consecutiveCount: 3
      severity: P1
      summary: "Worker TFlops Throttled"
      description: "Worker {{ .worker }} from Node {{ .node }} is using more than {{ .Threshold }}% of its TFlops limit"
      alertTargetInstance: "{{ .worker }}-{{ .uuid }}"
      runbookURL: "https://tensor-fusion.ai/guide/troubleshooting/handbook"
    
    # Worker VRAM switching too frequent alert
    - name: WorkerVRAMSwitchCountIncreasing
      query: |
        SELECT workload, worker, uuid, node, MAX(vram_resumed_cnt)-MIN(vram_resumed_cnt) as switch_increase
        FROM tf_worker_usage 
        WHERE {{ .Conditions }}
        GROUP BY workload, worker, uuid, node
        HAVING switch_increase > {{ .Threshold }}
      threshold: 0
      evaluationInterval: 2m
      consecutiveCount: 1
      severity: P1
      summary: "Worker VRAM Switch Count Increasing"
      description: "Worker {{ .worker }} from Node {{ .node }} has switched VRAM {{ .switch_increase }} times in last 2 minutes, GPU may be too hot"
      alertTargetInstance: "{{ .worker }}-{{ .uuid }}"
      runbookURL: "https://tensor-fusion.ai/guide/troubleshooting/handbook"
    
    # Worker can not scale up/scheduled alert
    - name: WorkerAllocationFailed
      query: |
        SELECT pool, (MAX(total_allocation_fail_cnt) - MIN(total_allocation_fail_cnt)) as failure_increase
        FROM tf_system_metrics
        WHERE {{ .Conditions }}
        GROUP BY pool
        HAVING failure_increase > {{ .Threshold }}
      threshold: 0
      evaluationInterval: 30s
      consecutiveCount: 1
      severity: P1
      summary: "Worker allocation failed for GPU Pool {{ .pool }}"
      description: "Worker allocation failed, {{ .failure_increase }} times in last 30 seconds for GPU Pool {{ .pool }}"
      alertTargetInstance: "{{ .pool }}"
      runbookURL: "https://tensor-fusion.ai/guide/troubleshooting/handbook"
    
    # Single GPU Alerts
    
    # GPU VRAM Full Alert
    - name: GPUVRAMFull
      query: |
        SELECT
          node,
          pool,
          uuid,
          avg(memory_percentage) AS memory_used
        FROM tf_gpu_usage
        WHERE memory_percentage > {{ .Threshold }} AND {{ .Conditions }}
        GROUP BY node, pool, uuid
      threshold: 97
      evaluationInterval: 30s
      consecutiveCount: 2
      severity: P1
      summary: "GPU VRAM Full, used {{ .memory_used }}% on {{ .node }} {{ .uuid }}"
      alertTargetInstance: "{{ .uuid }}"
      description: "GPU {{ .uuid }} on Node {{ .node }} in Pool {{ .pool }} has VRAM usage above {{ .Threshold }}% for 2 consecutive 30s, average usage: {{ .memory_used }}%"
    
    # GPU TFlops Full Alert
    - name: GPUTFlopsFull
      query: |
        SELECT
          node,
          pool,
          uuid,
          avg(compute_percentage) AS compute_used
        FROM tf_gpu_usage
        WHERE compute_percentage > {{ .Threshold }} AND {{ .Conditions }}
        GROUP BY node, pool, uuid
      threshold: 97
      evaluationInterval: 30s
      consecutiveCount: 4
      severity: P1
      summary: "GPU TFlops Full, used {{ .compute_used }}% on {{ .node }} {{ .uuid }}"
      alertTargetInstance: "{{ .uuid }}"
      description: "GPU {{ .uuid }} on Node {{ .node }} in Pool {{ .pool }} has TFlops usage above {{ .Threshold }}% for 4 consecutive 30s, average usage: {{ .compute_used }}%"
    
    # GPU Temperature alert
    - name: GPUTemperatureHigh
      query: |
        SELECT
          node,
          pool,
          uuid,
          avg(temperature) AS avg_temperature
        FROM tf_gpu_usage
        WHERE temperature > {{ .Threshold }} AND {{ .Conditions }}
        GROUP BY node, pool, uuid
      threshold: 90
      evaluationInterval: 30s
      consecutiveCount: 3
      severity: P1
      summary: "GPU Temperature High, {{ .avg_temperature }}°C on {{ .node }} {{ .uuid }}"
      alertTargetInstance: "{{ .uuid }}"
      description: "GPU {{ .uuid }} from Node {{ .node }} has temperature above {{ .Threshold }}°C, Average temperature: {{ .avg_temperature }}, GPU Pool: {{ .pool }}"
      runbookURL: "https://tensor-fusion.ai/guide/troubleshooting/handbook"
    
    # GPU Pool Alerts
    
    # Node TFlops allocation alert
    - name: NodeTFlopsAllocationCritical
      query: | 
        SELECT node, pool, (100 - avg(allocated_tflops_percent)) as tflops_available
        FROM tf_node_metrics
        WHERE {{ .Conditions }}
        GROUP BY node, pool
        HAVING tflops_available < {{ .Threshold }}
      threshold: 5
      evaluationInterval: 1m
      consecutiveCount: 2
      severity: P0
      summary: "Available TFlops below threshold, remaining {{ .tflops_available }}% for {{ .node }}"
      description: "Node {{ .node }} in Pool {{ .pool }} has available TFlops below {{ .Threshold }}%"
      alertTargetInstance: "{{ .node }}"
    
    - name: NodeTFlopsAllocationWarning
      query: | 
        SELECT node, pool, (100 - avg(allocated_tflops_percent)) as tflops_available
        FROM tf_node_metrics
        WHERE {{ .Conditions }}
        GROUP BY node, pool
        HAVING tflops_available < {{ .Threshold }}
      threshold: 10
      evaluationInterval: 1m
      consecutiveCount: 2
      severity: P1
      summary: "Node available TFlops below threshold, remaining {{ .tflops_available }}% for {{ .node }}"
      description: "Node {{ .node }} in Pool {{ .pool }} has available TFlops below {{ .Threshold }}%"
      alertTargetInstance: "{{ .node }}"
    
    # Pool TFlops allocation alert - Total
    - name: PoolTotalTFlopsAllocationCritical
      query: |
        SELECT pool, (100 - avg(allocated_tflops_percent)) as tflops_available
        FROM tf_node_metrics
        WHERE {{ .Conditions }}
        GROUP BY pool
        HAVING tflops_available < {{ .Threshold }}
      threshold: 5
      evaluationInterval: 1m
      consecutiveCount: 2
      severity: P0
      summary: "Pool available TFlops below threshold, remaining {{ .tflops_available }}%"
      description: "Pool {{ .pool }} has available TFlops below {{ .Threshold }}%"
      alertTargetInstance: "{{ .pool }}"
    
    - name: PoolTotalTFlopsAllocationWarning
      query: |
        SELECT pool, (100 - avg(allocated_tflops_percent)) as tflops_available
        FROM tf_node_metrics
        WHERE {{ .Conditions }}
        GROUP BY pool
        HAVING tflops_available < {{ .Threshold }}
      threshold: 10
      evaluationInterval: 1m
      consecutiveCount: 2
      severity: P1
      summary: "Pool available TFlops below threshold, remaining {{ .tflops_available }}%"
      description: "Pool {{ .pool }} has available TFlops below {{ .Threshold }}%"
      alertTargetInstance: "{{ .pool }}"
    
    # Node VRAM allocation alert
    - name: NodeVRAMAllocationCritical
      query: |
        SELECT node, pool, (100 - avg(allocated_vram_percent)) as vram_available
        FROM tf_node_metrics
        WHERE {{ .Conditions }}
        GROUP BY node, pool
        HAVING vram_available < {{ .Threshold }}
      threshold: 5
      evaluationInterval: 1m
      consecutiveCount: 2
      severity: P1
      summary: "Node available VRAM below threshold, remaining {{ .vram_available }}% for {{ .node }}"
      description: "Node {{ .node }} in Pool {{ .pool }} has available VRAM below {{ .Threshold }}%"
      alertTargetInstance: "{{ .node }}"

    - name: NodeVRAMAllocationWarning
      query: |
        SELECT node, pool, (100 - avg(allocated_vram_percent)) as vram_available
        FROM tf_node_metrics
        WHERE {{ .Conditions }}
        GROUP BY node, pool
        HAVING vram_available < {{ .Threshold }}
      threshold: 10
      evaluationInterval: 1m
      consecutiveCount: 2
      severity: P1
      summary: "Node available VRAM below threshold, remaining {{ .vram_available }}% for {{ .node }}"
      description: "Node {{ .node }} in Pool {{ .pool }} has available VRAM below {{ .Threshold }}%"
      alertTargetInstance: "{{ .node }}"
    
    # Pool VRAM allocation alert
    - name: PoolVRAMAllocationWarning
      query: |
        SELECT pool, (100 - avg(allocated_vram_percent)) as vram_available
        FROM tf_node_metrics
        WHERE {{ .Conditions }}
        GROUP BY pool
        HAVING vram_available < {{ .Threshold }}
      threshold: 10
      evaluationInterval: 1m
      consecutiveCount: 2
      severity: P1
      summary: "Pool available VRAM below threshold, remaining {{ .vram_available }}% for {{ .pool }}"
      description: "Pool {{ .pool }} has available VRAM below {{ .Threshold }}%"
      alertTargetInstance: "{{ .pool }}"
    
    # Empty or Idle GPU Alert
    - name: EmptyGPU
      query: |
        SELECT DISTINCT node 
        FROM tf_node_metrics 
        WHERE {{ .Conditions }} AND node NOT IN (
            SELECT DISTINCT node 
            FROM tf_worker_usage 
            WHERE {{ .Conditions }}
        )
      threshold: 0
      evaluationInterval: 5m
      consecutiveCount: 2
      severity: P2
      summary: "Empty GPU without any workload, Node {{ .node }}"
      description: "GPU Node {{ .node }} has no workload running, should be decommissioned"
      alertTargetInstance: "{{ .node }}"
    
    - name: IdleGPU
      query: |
        SELECT node, pool, uuid, avg(compute_percentage) as compute, avg(memory_percentage) vram
        FROM tf_gpu_usage
        WHERE {{ .Conditions }}
        GROUP BY node, pool, uuid
        HAVING compute < 1 and vram < {{ .Threshold }};
      threshold: 5
      evaluationInterval: 10m
      consecutiveCount: 3
      severity: P2
      summary: "Idle GPU found: {{ .uuid }} on Node {{ .node }}"
      description: "GPU {{ .uuid }} on Node {{ .node }} in Pool {{ .pool }} has been idle for 3 consecutive 10m, compute: {{ .compute }}, vram: {{ .vram }}"
      alertTargetInstance: "{{ .uuid }}"

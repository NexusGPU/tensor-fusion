        fullModelName: "NVIDIA A100-SXM4-80GB"
        costPerHour: "1.89"
        fp16TFlops: "312"
        maxPartitions: 7
        maxPlacementSlots: 8
        partitionTemplateRefs:
          - nv-80g-1g-10gb
          - nv-80g-1g-10gb-me
          - nv-80g-1g-20gb
          - nv-80g-2g-20gb
          - nv-80g-3g-40gb
          - nv-80g-4g-40gb
          - nv-80g-7g-80gb
      - model: A100_PCIe_80G
        fullModelName: "NVIDIA A100 80GB PCIe"
        costPerHour: "1.79"
        fp16TFlops: "312"
        maxPartitions: 7
        maxPlacementSlots: 8
        partitionTemplateRefs:
          - nv-80g-1g-10gb
          - nv-80g-1g-10gb-me
          - nv-80g-1g-20gb
          - nv-80g-2g-20gb
          - nv-80g-3g-40gb
          - nv-80g-4g-40gb
          - nv-80g-7g-80gb
      - model: A800_SXM_80G
        fullModelName: "NVIDIA A800-SXM4-80GB"
        costPerHour: "1.89"
        fp16TFlops: "312"
        maxPartitions: 7
        maxPlacementSlots: 8
        partitionTemplateRefs:
          - nv-80g-1g-10gb
          - nv-80g-1g-10gb-me
          - nv-80g-1g-20gb
          - nv-80g-2g-20gb
          - nv-80g-3g-40gb
          - nv-80g-4g-40gb
          - nv-80g-7g-80gb
      - model: A800_PCIe_80G
        fullModelName: "NVIDIA A800-PCIE-80GB"
        costPerHour: "1.79"
        fp16TFlops: "312"
        maxPartitions: 7
        maxPlacementSlots: 8
        partitionTemplateRefs:
          - nv-80g-1g-10gb
          - nv-80g-1g-10gb-me
          - nv-80g-1g-20gb
          - nv-80g-2g-20gb
          - nv-80g-3g-40gb
          - nv-80g-4g-40gb
          - nv-80g-7g-80gb

      # ---- H100 / H800 80GB family (same NVML profile IDs as A100-80GB) ----
      - model: H100_SXM
        fullModelName: "NVIDIA H100 80GB HBM3"
        costPerHour: "2.99"
        fp16TFlops: "989"
        maxPartitions: 7
        maxPlacementSlots: 8
        partitionTemplateRefs:
          - nv-80g-1g-10gb
          - nv-80g-1g-10gb-me
          - nv-80g-1g-20gb
          - nv-80g-2g-20gb
          - nv-80g-3g-40gb
          - nv-80g-4g-40gb
          - nv-80g-7g-80gb
      - model: H100_PCIe_80G
        fullModelName: "NVIDIA H100 PCIe"
        costPerHour: "2.79"
        fp16TFlops: "756"
        maxPartitions: 7
        maxPlacementSlots: 8
        partitionTemplateRefs:
          - nv-80g-1g-10gb
          - nv-80g-1g-10gb-me
          - nv-80g-1g-20gb
          - nv-80g-2g-20gb
          - nv-80g-3g-40gb
          - nv-80g-4g-40gb
          - nv-80g-7g-80gb
      - model: H800_SXM
        fullModelName: "NVIDIA H800 80GB HBM3"
        costPerHour: "2.99"
        fp16TFlops: "989"
        maxPartitions: 7
        maxPlacementSlots: 8
        partitionTemplateRefs:
          - nv-80g-1g-10gb
          - nv-80g-1g-10gb-me
          - nv-80g-1g-20gb
          - nv-80g-2g-20gb
          - nv-80g-3g-40gb
          - nv-80g-4g-40gb
          - nv-80g-7g-80gb
      - model: H800_PCIe
        fullModelName: "NVIDIA H800 PCIe"
        costPerHour: "2.79"
        fp16TFlops: "756"
        maxPartitions: 7
        maxPlacementSlots: 8
        partitionTemplateRefs:
          - nv-80g-1g-10gb
          - nv-80g-1g-10gb-me
          - nv-80g-1g-20gb
          - nv-80g-2g-20gb
          - nv-80g-3g-40gb
          - nv-80g-4g-40gb
          - nv-80g-7g-80gb

      # ---- A100 / A800 40GB family (7-slice; partitionTemplateRefs use nv-40g-*) ----
      - model: A100_SXM_40G
        fullModelName: "NVIDIA A100-SXM4-40GB"
        costPerHour: "1.49"
        fp16TFlops: "312"
        maxPartitions: 7
        maxPlacementSlots: 8
        partitionTemplateRefs:
          - nv-40g-1g-5gb
          - nv-40g-1g-5gb-me
          - nv-40g-1g-10gb
          - nv-40g-2g-10gb
          - nv-40g-3g-20gb
          - nv-40g-4g-20gb
          - nv-40g-7g-40gb
      - model: A100_PCIe_40G
        fullModelName: "NVIDIA A100-PCIE-40GB"
        costPerHour: "1.39"
        fp16TFlops: "312"
        maxPartitions: 7
        maxPlacementSlots: 8
        partitionTemplateRefs:
          - nv-40g-1g-5gb
          - nv-40g-1g-5gb-me
          - nv-40g-1g-10gb
          - nv-40g-2g-10gb
          - nv-40g-3g-20gb
          - nv-40g-4g-20gb
          - nv-40g-7g-40gb
      - model: A800_SXM_40G
        fullModelName: "NVIDIA A800-SXM4-40GB"
        costPerHour: "1.49"
        fp16TFlops: "312"
        maxPartitions: 7
        maxPlacementSlots: 8
        partitionTemplateRefs:
          - nv-40g-1g-5gb
          - nv-40g-1g-5gb-me
          - nv-40g-1g-10gb
          - nv-40g-2g-10gb
          - nv-40g-3g-20gb
          - nv-40g-4g-20gb
          - nv-40g-7g-40gb
      - model: A800_PCIe_40G
        fullModelName: "NVIDIA A800-PCIE-40GB"
        costPerHour: "1.39"
        fp16TFlops: "312"
        maxPartitions: 7
        maxPlacementSlots: 8
        partitionTemplateRefs:
          - nv-40g-1g-5gb
          - nv-40g-1g-5gb-me
          - nv-40g-1g-10gb

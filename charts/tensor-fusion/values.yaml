# Default values for tensor-fusion.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.


# This is for the secretes for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""

#This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}

initialGpuNodeLabelSelector: "nvidia.com/gpu.present=true"

controller:
  # This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
  replicaCount: 1

  nvidiaOperatorProgressiveMigration: false

  # This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
  image:
    repository: tensorfusion/tensor-fusion-operator
    # Overrides the image tag whose default is the chart appVersion.
    tag: "2.11.3"
  # This is for setting Kubernetes Annotations to a Pod.
  # For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/ 
  
  vectorAgentImage: docker.io/timberio/vector:latest-alpine

  # Startup command for TensorFusion controller-manager
  command:
    - /manager
    - -metrics-bind-address
    - :9000
    - -leader-elect
    - -enable-auto-scale
    - -enable-alert
    - -enable-auto-expander

  podAnnotations: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchExpressions:
                - key: tensor-fusion.ai/component
                  operator: In
                  values:
                    - operator

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8081
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 5
  readinessProbe:
    httpGet:
      path: /readyz
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 2
  resources:
    requests:
      memory: 256Mi
      cpu: 50m
    limits:
      memory: 2Gi
      cpu: 2000m

  admissionWebhooks:
    # Default Fail: the mutating webhook is scoped via objectSelector to only
    # tensor-fusion.ai/enabled=true pods, so a failure won't block unrelated
    # workloads. Failing closed prevents TF pods from being admitted without
    # the required resource injection / control sidecars when the webhook is
    # unavailable.
    failurePolicy: Fail
    secretName: tensor-fusion-webhook-secret
    patch:
      image: registry.k8s.io/ingress-nginx/kube-webhook-certgen:v1.5.0
greptime:
  isCloud: false
  host: greptimedb-standalone.greptimedb.svc.cluster.local
  port: 4002
  db: public
  installStandalone: true
  image:
    repository: docker.io/greptime/greptimedb
    tag: latest
  resources:
    requests:
      memory: 512Mi
      cpu: 100m
    limits:
      memory: 2Gi
      cpu: 200m

# greptime:
#   isCloud: true
#   host: your-instance.us-west-2.aws.greptime.cloud
#   user: "dummy"
#   db: "public"
#   password: "dummy"
#   port: 5001

agent:
  enrollToken: "token-from-cloud"
  agentId: 'org-from-cloud:env'
  cloudEndpoint: "wss://app.tensor-fusion.ai"
  
  image:
    repository: tensorfusion/tensor-fusion-agent
    tag: "1.0.0"
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 4000m
      memory: 2Gi

# Only needed if your pool is running in Provisioned mode, and the cloud vendor doesn't support IRSA or any serviceAccount like zero-credential Auth approaches
cloudVendorCredentials:
  accessKey: "dummy"
  secretKey: "dummy"

# Optional, opt-in default ProviderConfig CRs created by the chart.
# If you already manage ProviderConfig out-of-band (kubectl apply), keep this disabled.
# When enabled, the chart will create the CR with helm.sh/resource-policy: keep so
# uninstalling the chart will NOT delete it.
providerConfigs:
  nvidia:
    enabled: true
    name: nvidia-provider
    # MIG (partitioned) requires the hypervisor container to run privileged so
    # NVML can create GpuInstance / ComputeInstance. With this true and vendor
    # =NVIDIA, the operator auto-injects NVIDIA_MIG_CONFIG_DEVICES=all and
    # NVIDIA_MIG_MONITOR_DEVICES=all so the runtime exposes the dynamic
    # /proc/driver/nvidia/capabilities/ files MIG operations need.
    #
    # NOTE: privilegedHypervisor only flips capabilities, it does NOT change
    # the process UID. MIG calls writing to /dev/nvidia-caps/nvidia-cap1
    # additionally require uid=0. Set pod-level
    # `securityContext.runAsUser: 0` in the GPUPool / TensorFusionCluster
    # `componentConfig.hypervisor.podTemplate.template.spec` to take effect
    # (the operator overwrites container-level securityContext on every
    # reconcile, but pod-level fields survive).
    privilegedHypervisor: true
    images:
      middleware: tensorfusion/vgpu-provider-nvidia:latest
      remoteClient: tensorfusion/tensor-fusion-client:latest
      remoteWorker: tensorfusion/tensor-fusion-worker:latest
    inUseResourceNames:
      - nvidia.com/gpu
      # MIG profile names — device-plugin only reports what physically exists on
      # each node, so listing 40GB / 80GB / A30 families together is safe.
      # 80GB family: A100-80GB / H100-80GB / A800-80GB / H800
      - nvidia.com/mig-1g.10gb
      - nvidia.com/mig-2g.20gb
      - nvidia.com/mig-3g.40gb
      - nvidia.com/mig-4g.40gb
      - nvidia.com/mig-7g.80gb
      # 40GB family: A100-40GB / A800-40GB
      - nvidia.com/mig-1g.5gb
      - nvidia.com/mig-2g.10gb
      - nvidia.com/mig-3g.20gb
      - nvidia.com/mig-4g.20gb
      - nvidia.com/mig-7g.40gb
      # A30 (4-slice MIG)
      - nvidia.com/mig-1g.6gb
      - nvidia.com/mig-2g.12gb
      - nvidia.com/mig-4g.24gb
    # =============================================================================
    # Template layout (since main introduced VirtualizationTemplate.nvmlProfileId):
    #   - `id` is the chart-side unique key, used by partitionTemplateRefs lookup
    #     and matched against user-facing pod annotations / WorkloadProfile.
    #   - `nvmlProfileId` is the NVML GI Profile ID forwarded to vgpu-provider →
    #     NVML's nvmlDeviceGetGpuInstanceProfileInfoV / CreateGpuInstance.
    #
    # Without `nvmlProfileId`, the resolver falls back to passing `id` verbatim
    # to NVML — which means `id` itself would have to be an integer-as-string and
    # would collide between architectures (A30 id=14 means 1g.6gb while A100
    # id=14 means 2g.20gb — different physical semantics, different
    # computePercent). Decoupling the two fields lets one ProviderConfig cover
    # all MIG-capable NVIDIA cards.
    # See: api/v1/providerconfig_types.go (VirtualizationTemplate),
    #      pkg/hypervisor/device/provider_template_resolver.go:downstreamTemplateID.
    # =============================================================================

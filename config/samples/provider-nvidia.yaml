    fp16TFlops: '312'
    fullModelName: NVIDIA A100-SXM4-80GB
    maxPartitions: 7
    maxPlacementSlots: 8
    model: A100_SXM_80G
    partitionTemplateRefs:
    - nv-80g-1g-10gb
    - nv-80g-1g-10gb-me
    - nv-80g-1g-20gb
    - nv-80g-2g-20gb

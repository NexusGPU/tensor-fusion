apiVersion: tensor-fusion.ai/v1
kind: TensorFusionCluster
metadata:
  labels:
    app.kubernetes.io/name: tensor-fusion
    app.kubernetes.io/managed-by: kustomize
  name: tensor-fusion
spec:
  gpuPools:
    - name: shared
      isDefault: true
      specTemplate:
        capacityConfig:
          maxResources:
            tflops: "100"
            vram: "100Gi"
          minResources:
            tflops: "20"
            vram: "10Gi"
          oversubscription:
            tflopsOversellRatio: 2000
            vramExpandToHostDisk: 60
            vramExpandToHostMem: 50
          warmResources:
            tflops: "10"
            vram: "5Gi"
        componentConfig:
          hypervisor:
            image: tensorfusion/tensor-fusion-hypervisor:latest
            podTemplate:
              template:
                spec:
                  # Pod-level securityContext is the SUPPORTED way to make
                  # the hypervisor container run as root. Container-level
                  # securityContext is overwritten by the operator on every
                  # reconcile; pod-level survives. Required by Ascend libdcmi
                  # (uid=0 DAC check on /dev/davinci_manager). NVIDIA only
                  # needs this when doing MIG partition operations (which
                  # also require ProviderConfig.hypervisor.privilegedHypervisor
                  # = true).
                  securityContext:
                    runAsUser: 0
                    runAsGroup: 0
                  # Optional: host npu-smi for `kubectl exec ... -- npu-smi info`
                  # debugging. libdcmi enumerates devices internally — drop this
                  # block if you don't need exec-time inspection.
                  volumes:
                    - name: host-npu-smi
                      hostPath:
                        path: /usr/local/sbin/npu-smi
                        type: File
                  containers:
                    - name: tensor-fusion-hypervisor
                      env:
                        - name: TF_HARDWARE_VENDOR
                          value: Ascend
                        - name: TF_ACCELERATOR_LIB_PATH
                          value: /run/tensor-fusion/vgpu/libaccelerator_ascend.so
                        - name: LD_LIBRARY_PATH
                          value: /usr/local/Ascend/driver/lib64:/usr/local/Ascend/driver/lib64/driver:/usr/local/Ascend/driver/lib64/common:/usr/local/dcmi
                      # Driver / DCMI libs come from
                      # ProviderConfig.hypervisor.hostPathMounts; do not
                      # redeclare them here.
                      volumeMounts:
                        - name: host-npu-smi
                          mountPath: /usr/local/sbin/npu-smi
                          readOnly: true
        nodeManagerConfig:
          defaultVendor: Ascend
          nodeSelector:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: huawei.com/npu.present
                    operator: In
                    values:
                      - "true"

# Real-world MooreThreads TensorFusionCluster example (single MooreThreads pool, from a running cluster).
# Image tags normalized to :latest; pin them for production.
apiVersion: tensor-fusion.ai/v1
kind: TensorFusionCluster
metadata:
  name: tensor-fusion
spec:
  gpuPools:
  - isDefault: true
    name: mthreads-shared
    specTemplate:
      capacityConfig:
        maxResources:
          cpu: '0'
          memory: '0'
          tflops: '100'
          vram: 100Gi
        minResources:
          cpu: '0'
          memory: '0'
          tflops: '20'
          vram: 10Gi
        oversubscription:
          tflopsOversellRatio: 2000
          vramExpandToHostDisk: 60
          vramExpandToHostMem: 50
        warmResources:
          cpu: '0'
          memory: '0'
          tflops: '10'
          vram: 5Gi
      componentConfig:
        client:
          operatorEndpoint: http://tensor-fusion-sys.tensor-fusion-sys:8080
          patchToContainer:
            env:
            - name: TF_ENABLE_LOG
              value: '1'
            - name: TF_LOG_PATH
              value: /tmp/tf.log
          patchToPod:
            spec: {}
        hypervisor:
          enableVector: true
          image: docker.io/tensorfusion/tensor-fusion-hypervisor:latest
          podTemplate:
            template:
              spec:
                containers:
                - command:
                  - /bin/sh
                  - -c
                  - mount -o remount,exec,bind /run/tensor-fusion && exec hypervisor
                    "$@"
                  - --
                  env:
                  - name: TF_LOG_LEVEL
                    value: debug
                  - name: TF_ACCELERATOR_LIB_PATH
                    value: /run/tensor-fusion/vgpu/libaccelerator_musa.so
                  - name: MTHREADS_VISIBLE_DEVICES
                    value: all
                  - name: MTHREADS_DRIVER_CAPABILITIES
                    value: compute,utility
                  name: tensor-fusion-hypervisor
                  resources:
                    limits:
                      cpu: 1000m
                      memory: 1Gi
                    requests:
                      cpu: 60m
                      memory: 128Mi
                  securityContext:
                    privileged: true
                    runAsGroup: 0
                    runAsUser: 0
                - name: vector
                  resources:
                    requests:
                      cpu: 50m
                      memory: 64Mi
                runtimeClassName: mthreads
                securityContext:
                  runAsGroup: 0
                  runAsUser: 0
          portNumber: 8001
          vectorImage: docker.m.daocloud.io/timberio/vector:latest-alpine
        worker:
          image: rgpu-work:latest
          podTemplate:
            template:
              spec:
                containers:
                - env:
                  - name: TF_ENABLE_LOG
                    value: '1'
                  name: tensorfusion-worker
                  resources:
                    limits:
                      cpu: 2000m
                      memory: 8Gi
                    requests:
                      cpu: 100m
                      memory: 128Mi
      nodeManagerConfig:
        defaultVendor: MooreThreads
        nodeCompaction:
          period: 30m
        nodePoolRollingUpdatePolicy:
          batchInterval: 1s
          batchPercentage: 20
          maintenanceWindow:
            includes:
            - 2 2 * * *
          maxDuration: 10m
        nodeSelector:
          nodeSelectorTerms:
          - matchExpressions:
            - key: mthreads.com/gpu.present
              operator: In
              values:
              - 'true'
        provisioningMode: AutoSelect
      schedulingConfigTemplate: tf-scheduling-config

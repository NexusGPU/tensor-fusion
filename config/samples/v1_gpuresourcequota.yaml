apiVersion: tensor-fusion.ai/v1
kind: GPUResourceQuota
metadata:
  name: production-namespace
  namespace: production-namespace
spec:
  # Total namespace limits (similar to ResourceQuotas)
  total:
    requests:
      tflops: "1000"
      vram: "200Gi"
    limits:
      tflops: "1500"
      vram: "300Gi"
    maxWorkers: 100
    alertThresholdPercent: 90

  # Per-workload limits (similar to LimitRanges)
  single:
    maxRequests:
      tflops: "200"
      vram: "40Gi"
    maxLimits:
      tflops: "300"
      vram: "60Gi"
    maxGPUCount: 8
    defaultRequests:
      tflops: "500m"
      vram: "1Gi"
    defaultLimits:
      tflops: "1"
      vram: "2Gi"
---
apiVersion: tensor-fusion.ai/v1
kind: GPUResourceQuota
metadata:
  name: development-namespace
  namespace: development-namespace
spec:
  # Total namespace limits for development
  total:
    requests:
      tflops: "200"
      vram: "40Gi"
    limits:
      tflops: "300"
      vram: "60Gi"
    maxWorkers: 20
    alertThresholdPercent: 95

  # Per-workload limits for development
  single:
    maxRequests:
      tflops: "50"
      vram: "8Gi"
    maxLimits:
      tflops: "80"
      vram: "12Gi"
    maxGPUCount: 2
    defaultRequests:
      tflops: "250m"
      vram: "512Mi"
    defaultLimits:
      tflops: "500m"
      vram: "1Gi"
---
apiVersion: tensor-fusion.ai/v1
kind: GPUResourceQuota
metadata:
  name: research-namespace
  namespace: research-namespace
spec:
  # Total namespace limits for research
  total:
    requests:
      tflops: "2000"
      vram: "400Gi"
    limits:
      tflops: "3000"
      vram: "600Gi"
    maxWorkers: 200
    alertThresholdPercent: 85

  # Per-workload limits for research (more flexible)
  single:
    maxRequests:
      tflops: "500"
      vram: "80Gi"
    maxLimits:
      tflops: "800"
      vram: "120Gi"
    maxGPUCount: 16
    defaultRequests:
      tflops: "1"
      vram: "2Gi"
    defaultLimits:
      tflops: "2"
      vram: "4Gi"

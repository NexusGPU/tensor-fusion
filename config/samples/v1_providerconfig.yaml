# Example ProviderConfig for NVIDIA GPUs
# This replaces the centralized gpu-info ConfigMap with vendor-specific configuration
apiVersion: tensor-fusion.ai/v1
kind: ProviderConfig
metadata:
  name: nvidia-provider
spec:
  # Vendor name identifies which hardware this config applies to
  vendor: NVIDIA

  # Container images for TensorFusion components
  # These vendor-specific images contain the appropriate drivers and runtimes
  images:
    middleware: tensorfusion/tensor-fusion-operator:latest
    remoteClient: tensorfusion/tensor-fusion-client:latest
    remoteWorker: tensorfusion/tensor-fusion-worker:latest

  # Hypervisor settings.
  # MIG partition operations (creating GpuInstance / ComputeInstance) need the
  # hypervisor container to run privileged AND to ask the NVIDIA Container
  # Runtime to expose the dynamic /proc/driver/nvidia/capabilities/ files.
  # When privilegedHypervisor=true and vendor=NVIDIA, the operator
  # auto-injects NVIDIA_MIG_CONFIG_DEVICES=all and NVIDIA_MIG_MONITOR_DEVICES=all
  # so MIG works out of the box; no manual extraEnv needed.
  #
  # NOTE: privilegedHypervisor only flips `securityContext.privileged: true` on
  # the container — it does NOT change the process UID. MIG calls additionally
  # require uid=0 (DAC check when writing to /dev/nvidia-caps/nvidia-cap1).
  # Set pod-level `runAsUser: 0` / `runAsGroup: 0` in the GPUPool /
  # TensorFusionCluster componentConfig.hypervisor.podTemplate — the operator
  # rebuilds container-level securityContext on every reconcile, but pod-level
  # fields survive. See config/samples/v1_gpupool.yaml for the matching
  # pod-level snippet.
  hypervisor:
    privilegedHypervisor: true

  # Resource names that should be removed from pod specs when TensorFusion manages GPUs
  # These are the standard Kubernetes resource names used by device plugins
  inUseResourceNames:
    - "nvidia.com/gpu"
    - "nvidia.com/mig-1g.10gb"
    - "nvidia.com/mig-2g.20gb"
    - "nvidia.com/mig-3g.40gb"
    - "nvidia.com/mig-4g.40gb"
    - "nvidia.com/mig-7g.80gb"

  # Device plugin detection settings
  devicePluginDetection:
    resourceNamePrefixes:
      - "nvidia.com/gpu"
      - "nvidia.com/mig"
    usedBySystemName: "nvidia-device-plugin"

  # Hardware metadata for GPU models
  # This information is used for scheduling, pricing, and resource allocation
  # Hardware catalog. Each entry binds a GPU model to a subset of
  # virtualizationTemplates via partitionTemplateRefs. Cards that don't support
  # MIG omit partitionTemplateRefs.
  hardwareMetadata:
    # ---- A100 / A800 / H100 / H800 80GB family (7-slice) ----
    - model: A100_SXM_80G
      fullModelName: "NVIDIA A100-SXM4-80GB"
      costPerHour: "1.89"
      fp16TFlops: "312"
      maxPartitions: 7
      maxPlacementSlots: 8
      partitionTemplateRefs:
        - nv-80g-1g-10gb
        - nv-80g-1g-10gb-me
        - nv-80g-1g-20gb
        - nv-80g-2g-20gb
        - nv-80g-3g-40gb
        - nv-80g-4g-40gb
        - nv-80g-7g-80gb

    - model: H100_SXM
      fullModelName: "NVIDIA H100 80GB HBM3"
      costPerHour: "2.99"
      fp16TFlops: "989"
      maxPartitions: 7
      maxPlacementSlots: 8
      partitionTemplateRefs:
        - nv-80g-1g-10gb
        - nv-80g-1g-10gb-me
        - nv-80g-1g-20gb
        - nv-80g-2g-20gb
        - nv-80g-3g-40gb
        - nv-80g-4g-40gb
        - nv-80g-7g-80gb

    # ---- A100 / A800 40GB family (7-slice; reuses NVML profile ids but different memory) ----
    - model: A100_SXM_40G
      fullModelName: "NVIDIA A100-SXM4-40GB"
      costPerHour: "1.49"
      fp16TFlops: "312"
      maxPartitions: 7
      maxPlacementSlots: 8
      partitionTemplateRefs:
        - nv-40g-1g-5gb
        - nv-40g-1g-5gb-me
        - nv-40g-1g-10gb
        - nv-40g-2g-10gb
        - nv-40g-3g-20gb
        - nv-40g-4g-20gb
        - nv-40g-7g-40gb

    # ---- A30 (4-slice MIG; different architecture than A100/H100) ----
    - model: A30
      fullModelName: "NVIDIA A30"
      costPerHour: "0.45"
      fp16TFlops: "165"
      maxPartitions: 4
      maxPlacementSlots: 4
      partitionTemplateRefs:
        - nv-a30-1g-6gb
        - nv-a30-2g-12gb
        - nv-a30-4g-24gb

    # ---- Consumer / non-MIG GPU (catalog only, no partitionTemplateRefs) ----
    - model: RTX4090
      fullModelName: "NVIDIA GeForce RTX 4090"
      costPerHour: "0.3"
      fp16TFlops: "165.16"

  # Virtualization templates.
  #
  # ----------------------------------------------------------------------------
  # Field semantics:
  #   - `id`            : chart-side unique key used by partitionTemplateRefs
  #                       AND matched against user pod annotations / WorkloadProfile.
  #   - `nvmlProfileId` : the integer NVIDIA NVML GI Profile ID forwarded to
  #                       vgpu-provider → NVML's nvmlDeviceGetGpuInstanceProfileInfoV.
  #                       When set, the resolver returns this integer (converted to
  #                       string) to the downstream partition API instead of `id`.
  #   - `name`          : the friendly profile name end users put in their pod
  #                       annotation `tensor-fusion.ai/partition` (e.g., "1g.10gb").
  #                       Matched canonically — "1g.10gb" / "mig-1g.10gb" / "mig-1g-10gb"
  #                       all hit the same template.
  #
  # Why both `id` and `nvmlProfileId`:
  # Without `nvmlProfileId`, the resolver falls back to passing `id` verbatim to
  # NVML — which would require `id` to be the integer-as-string and would cause
  # collisions across architectures (e.g., NVML id=14 means 1g.6gb on A30 but
  # 2g.20gb on A100). Decoupling the fields lets one ProviderConfig cover
  # 7-slice (A100/H100/A800/H800) AND 4-slice (A30) NVIDIA cards.
  #
  # ----------------------------------------------------------------------------
  # `id` naming convention used below:
  #
  #     nv-<family>-<profile>[-me]
  #
  #   <family>  family code that determines which physical card this template
  #             targets. We use the *memory size of the full GPU* as the family
  #             tag — same compute slicing but different memory variants share a
  #             family. Current values:
  #
  #               80g  → A100 80GB / A800 80GB / H100 80GB / H800 80GB
  #                      (7-slice MIG; 1g profile has 10GB memory each)
  #               40g  → A100 40GB / A800 40GB
  #                      (7-slice MIG; 1g profile has 5GB memory each)
  #               a30  → A30 24GB
  #                      (4-slice MIG; different architecture, different
  #                      NVML id table and computePercent — must be separate)
  #
  #             Future additions: `h100-94g`, `h200`, `b200`, `pro-blackwell`, …
  #             when we have authoritative `nvidia-smi mig -lgip` data for those.
  #
  #   <profile> the canonical MIG profile shorthand `NgSlice-Mgb` exactly as it
  #             appears in `nvidia-smi mig` output. Dashes (`-`) replace dots
  #             (`.`) for k8s-id friendliness (DNS-1123 compatible) — e.g.,
  #             `1g.10gb` → `1g-10gb`. The end-user-facing `name` field below
  #             keeps the canonical dotted form.
  #
  #   -me       optional suffix marking the "+me" (media-extension) variant.
  #             These profiles add the singleton JPEG + OFA hardware decoder.
  #             Only one +me instance can exist per GPU at a time.
  #
  #   Examples:
  #     nv-80g-1g-10gb      = "1g.10gb" on A100/H100 80GB (NVML id 19)
  #     nv-80g-1g-10gb-me   = "1g.10gb+me" on A100/H100 80GB (NVML id 20, singleton)
  #     nv-80g-1g-20gb      = "1g.20gb" on A100/H100 80GB (NVML id 15, double-mem)
  #     nv-40g-1g-5gb       = "1g.5gb" on A100 40GB (NVML id 19)
  #     nv-40g-1g-10gb      = "1g.10gb" on A100 40GB (NVML id 15, double-mem)
  #     nv-a30-2g-12gb      = "2g.12gb" on A30 (NVML id 5)
  #
  # See: api/v1/providerconfig_types.go (VirtualizationTemplate.NVMLProfileID),
  #      pkg/hypervisor/device/provider_template_resolver.go:downstreamTemplateID.
  # ----------------------------------------------------------------------------
  virtualizationTemplates:
    # ===== A100/A800/H100/H800 80GB family (7-slice) =====
    - id: nv-80g-1g-10gb
      nvmlProfileId: 19
      name: "1g.10gb"
      memoryGigabytes: 10
      computePercent: "14.2857"
      description: "1/7 GPU slice with 10GB memory (A100/H100 80GB)"
      maxInstances: 7
      placementLimit: [0, 1, 2, 3, 4, 5, 6]
      placementOffset: 1
      isolationGroupSharing: "exclusive"

    - id: nv-80g-1g-10gb-me
      nvmlProfileId: 20
      name: "1g.10gb+me"
      memoryGigabytes: 10
      computePercent: "14.2857"
      description: "1g slice + media engine (singleton; +1 JPEG + 1 OFA)"
      maxInstances: 1
      placementLimit: [0, 1, 2, 3, 4, 5, 6]
      placementOffset: 1
      isolationGroupSharing: "exclusive"

    - id: nv-80g-1g-20gb
      nvmlProfileId: 15
      name: "1g.20gb"
      memoryGigabytes: 20
      computePercent: "14.2857"
      description: "1g slice with double memory (A100/H100 80GB)"
      maxInstances: 4
      placementLimit: [0, 2, 4, 6]
      placementOffset: 2
      isolationGroupSharing: "exclusive"

    - id: nv-80g-2g-20gb
      nvmlProfileId: 14
      name: "2g.20gb"
      memoryGigabytes: 20
      computePercent: "28.5714"
      description: "2/7 GPU slice with 20GB memory (A100/H100 80GB)"
      maxInstances: 3
      placementLimit: [0, 2, 4]
      placementOffset: 2
      isolationGroupSharing: "exclusive"

    - id: nv-80g-3g-40gb
      nvmlProfileId: 9
      name: "3g.40gb"
      memoryGigabytes: 40
      computePercent: "42.8571"
      description: "3/7 GPU slice with 40GB memory (A100/H100 80GB)"
      maxInstances: 2
      placementLimit: [0, 4]
      placementOffset: 4
      isolationGroupSharing: "exclusive"

    - id: nv-80g-4g-40gb
      nvmlProfileId: 5
      name: "4g.40gb"
      memoryGigabytes: 40
      computePercent: "57.1428"
      description: "4/7 GPU slice with 40GB memory (A100/H100 80GB)"
      maxInstances: 1
      placementLimit: [0]
      placementOffset: 4
      isolationGroupSharing: "exclusive"

    - id: nv-80g-7g-80gb
      nvmlProfileId: 0
      name: "7g.80gb"
      memoryGigabytes: 80
      computePercent: "100"
      description: "Full GPU with 80GB memory (A100/H100 80GB)"
      maxInstances: 1
      placementLimit: [0]
      placementOffset: 8
      isolationGroupSharing: "exclusive"

    # ===== A100/A800 40GB family (7-slice; NVML id=15 vs 19 swap meaning vs 80GB) =====
    - id: nv-40g-1g-5gb
      nvmlProfileId: 19
      name: "1g.5gb"
      memoryGigabytes: 5
      computePercent: "14.2857"
      description: "1/7 GPU slice with 5GB memory (A100 40GB)"
      maxInstances: 7
      placementLimit: [0, 1, 2, 3, 4, 5, 6]
      placementOffset: 1
      isolationGroupSharing: "exclusive"

    - id: nv-40g-1g-5gb-me
      nvmlProfileId: 20
      name: "1g.5gb+me"
      memoryGigabytes: 5
      computePercent: "14.2857"
      description: "1g.5gb + media engine (singleton)"
      maxInstances: 1
      placementLimit: [0, 1, 2, 3, 4, 5, 6]
      placementOffset: 1
      isolationGroupSharing: "exclusive"

    - id: nv-40g-1g-10gb
      nvmlProfileId: 15
      name: "1g.10gb"
      memoryGigabytes: 10
      computePercent: "14.2857"
      description: "1g slice with double memory (A100 40GB; same compute as 1g.5gb)"
      maxInstances: 4
      placementLimit: [0, 2, 4, 6]
      placementOffset: 2
      isolationGroupSharing: "exclusive"

    - id: nv-40g-2g-10gb
      nvmlProfileId: 14
      name: "2g.10gb"
      memoryGigabytes: 10
      computePercent: "28.5714"
      description: "2/7 GPU slice with 10GB memory (A100 40GB)"
      maxInstances: 3
      placementLimit: [0, 2, 4]
      placementOffset: 2
      isolationGroupSharing: "exclusive"

    - id: nv-40g-3g-20gb
      nvmlProfileId: 9
      name: "3g.20gb"
      memoryGigabytes: 20
      computePercent: "42.8571"
      description: "3/7 GPU slice with 20GB memory (A100 40GB)"
      maxInstances: 2
      placementLimit: [0, 4]
      placementOffset: 4
      isolationGroupSharing: "exclusive"

    - id: nv-40g-4g-20gb
      nvmlProfileId: 5
      name: "4g.20gb"
      memoryGigabytes: 20
      computePercent: "57.1428"
      description: "4/7 GPU slice with 20GB memory (A100 40GB)"
      maxInstances: 1
      placementLimit: [0]
      placementOffset: 4
      isolationGroupSharing: "exclusive"

    - id: nv-40g-7g-40gb
      nvmlProfileId: 0
      name: "7g.40gb"
      memoryGigabytes: 40
      computePercent: "100"
      description: "Full GPU with 40GB memory (A100 40GB)"
      maxInstances: 1
      placementLimit: [0]
      placementOffset: 8
      isolationGroupSharing: "exclusive"

    # ===== A30 (4-slice) =====
    # Different NVML id table from 7-slice family; different computePercent
    # (25 / 50 / 100 instead of 14.2857 / 28.5714 / ...).
    - id: nv-a30-1g-6gb
      nvmlProfileId: 14
      name: "1g.6gb"
      memoryGigabytes: 6
      computePercent: "25"
      description: "1/4 GPU slice with 6GB memory (A30)"
      maxInstances: 4
      placementLimit: [0, 1, 2, 3]
      placementOffset: 1
      isolationGroupSharing: "exclusive"

    - id: nv-a30-2g-12gb
      nvmlProfileId: 5
      name: "2g.12gb"
      memoryGigabytes: 12
      computePercent: "50"
      description: "2/4 GPU slice with 12GB memory (A30)"
      maxInstances: 2
      placementLimit: [0, 2]
      placementOffset: 2
      isolationGroupSharing: "exclusive"

    - id: nv-a30-4g-24gb
      nvmlProfileId: 0
      name: "4g.24gb"
      memoryGigabytes: 24
      computePercent: "100"
      description: "Full A30 GPU with 24GB memory"
      maxInstances: 1
      placementLimit: [0]
      placementOffset: 4
      isolationGroupSharing: "exclusive"
---
# Example ProviderConfig for Ascend NPU
apiVersion: tensor-fusion.ai/v1
kind: ProviderConfig
metadata:
  name: ascend-provider
spec:
  vendor: Ascend

  images:
    middleware: tensorfusion/tensor-fusion-ascend-operator:latest
    remoteClient: tensorfusion/tensor-fusion-ascend-client:latest
    remoteWorker: tensorfusion/tensor-fusion-ascend-worker:latest

  hypervisor:
    privilegedHypervisor: true
    ldLibraryPath: "/usr/local/Ascend/driver/lib64:/usr/local/Ascend/driver/lib64/driver:/usr/local/Ascend/driver/lib64/common:/usr/local/dcmi"
    # 仅静态 vNPU 场景使用该开关（由 hypervisor 透传为 ASCEND_RUNTIME_OPTIONS）。
    # 动态切分场景通常不需要配置该项。
    extraEnv:
      - name: TF_ASCEND_PARTITION_RUNTIME_OPTIONS
        value: VIRTUAL
    deviceMount:
      deviceMountRule: "true"
      partitionedDeviceMountRule: "true" #device["hostPath"].startsWith("/dev/vdavinci")
      sharedDevices:
        - /dev/davinci_manager
        - /dev/davinci_manager_docker
        - /dev/devmm_svm
        - /dev/hisi_hdc
        - /dev/uburma/*
        - /dev/ummu/*
    hostPathMounts:
      - name: ascend-driver
        hostPath: /usr/local/Ascend/driver
        mountPath: /usr/local/Ascend/driver
        readOnly: true
      - name: ascend-dcmi
        hostPath: /usr/local/dcmi
        mountPath: /usr/local/dcmi
        readOnly: true

  inUseResourceNames:
    - "huawei.com/Ascend910"
    - "huawei.com/Ascend310"
    - "huawei.com/npu"

  hardwareMetadata:
    - model: Ascend 310P3
      fullModelName: "Ascend 310P3"
      costPerHour: "1.0"
      fp16TFlops: "22"
      maxPartitions: 7
      maxIsolationGroups: 4
      totalExtendedResources:
        AICORE: 8
        AICPU: 7
        VPC: 12
        VENC: 3
        VDEC: 12
        JPEGD: 16
        JPEGE: 8
      partitionTemplateRefs:
        - ascend-vir01
        - ascend-vir02
        - ascend-vir04
    - model: Ascend 910B
      fullModelName: "Huawei Ascend 910B"
      costPerHour: "2.0"
      fp16TFlops: "320"
      maxPartitions: 4
      maxIsolationGroups: 4
      totalExtendedResources:
        AICORE: 8
        AICPU: 7
        VPC: 12
        VENC: 3
        VDEC: 12
        JPEGD: 16
        JPEGE: 8
      partitionTemplateRefs:
        - ascend-vir01
        - ascend-vir02
        - ascend-vir04

  virtualizationTemplates:
    # vir01: 1/8 NPU slice with time-sharing in vGroup
    - id: ascend-vir01
      name: "vir01"
      memoryGigabytes: 8
      computePercent: "12.5"
      description: "1/8 NPU slice (vir01)"
      maxInstances: 8
      isolationGroupSharing: "shared"
      maxPartitionsPerIsolationGroup: 2
      isolationGroupSlots: 2
      extendedResources:
        AICORE: 1
        AICPU: 1
        VPC: 1
        VENC: 0
        VDEC: 1
        JPEGD: 2
        JPEGE: 1

    # vir02: 1/4 NPU slice with exclusive vGroup
    - id: ascend-vir02
      name: "vir02"
      memoryGigabytes: 16
      computePercent: "25"
      description: "1/4 NPU slice (vir02)"
      maxInstances: 4
      isolationGroupSharing: "exclusive"
      isolationGroupSlots: 2
      extendedResources:
        AICORE: 2
        AICPU: 2
        VPC: 3
        VENC: 1
        VDEC: 3
        JPEGD: 4
        JPEGE: 2

    # vir04: 1/2 NPU slice with exclusive vGroup
    - id: ascend-vir04
      name: "vir04"
      memoryGigabytes: 32
      computePercent: "50"
      description: "1/2 NPU slice (vir04)"
      maxInstances: 2
      isolationGroupSharing: "exclusive"
      isolationGroupSlots: 4
      extendedResources:
        AICORE: 4
        AICPU: 4
        VPC: 6
        VENC: 2
        VDEC: 6
        JPEGD: 8
        JPEGE: 4

apiVersion: tensor-fusion.ai/v1
kind: GPUPool
metadata:
  labels:
    app.kubernetes.io/name: tensor-fusion
    app.kubernetes.io/managed-by: kustomize
  name: gpupool-sample
spec:
  capacityConfig:
    maxResources:
      tflops: "100"
      vram: "100Gi"
    minResources:
      tflops: "20"
      vram: "10Gi"
    oversubscription:
      tflopsOversellRatio: 2000
      vramExpandToHostDisk: 60
      vramExpandToHostMem: 50
    warmResources:
      tflops: "10"
      vram: "5Gi"
  componentConfig:
    hypervisor:
      image: tensorfusion/tensor-fusion-hypervisor:latest
      podTemplate:
        template:
          spec:
            # Pod-level securityContext is the SUPPORTED way to make the
            # hypervisor container run as root. The container-level
            # securityContext set here would be overwritten by the operator
            # (it always rebuilds the container's securityContext). Pod-level
            # fields (runAsUser/runAsGroup) survive that rebuild and are
            # needed by Ascend's libdcmi (DAC check on /dev/davinci_manager
            # requires uid=0). NVIDIA NVML works as non-root, but for any
            # provider that opts into `privilegedHypervisor: true` and runs
            # hardware-management calls (MIG / vNPU partitioning), set this.
            securityContext:
              runAsUser: 0
              runAsGroup: 0
            containers:
              - name: tensor-fusion-hypervisor
                env:
                  - name: TF_HARDWARE_VENDOR
                    value: Ascend
                  - name: TF_ACCELERATOR_LIB_PATH
                    value: /run/tensor-fusion/vgpu/libaccelerator_ascend.so
                  - name: LD_LIBRARY_PATH
                    value: /usr/local/Ascend/driver/lib64:/usr/local/Ascend/driver/lib64/driver:/usr/local/Ascend/driver/lib64/common:/usr/local/dcmi
  nodeManagerConfig:
    defaultVendor: Ascend
    nodeSelector:
      nodeSelectorTerms:
        - matchExpressions:
            - key: huawei.com/npu.present
              operator: In
              values:
                - "true"

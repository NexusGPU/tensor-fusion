# PPU (Alibaba Zhenwu 810E) TensorFusionCluster example.
# Structure mirrors the NVIDIA example; PPU is NVML/CUDA-compatible so the worker
# reuses the same-name NVML/CUDA lib paths. Vendor-specific hostPath mounts,
# ldLibraryPath and deviceMount live in the ProviderConfig (provider-ppu.yaml).
# Image tags default to :latest; pin them for production.
apiVersion: tensor-fusion.ai/v1
kind: TensorFusionCluster
metadata:
  name: tensor-fusion
spec:
  gpuPools:
  - isDefault: true
    name: shared
    specTemplate:
      capacityConfig:
        maxResources:
          cpu: '0'
          memory: '0'
          tflops: '100'
          vram: 100Gi
        minResources:
          cpu: '0'
          memory: '0'
          tflops: '20'
          vram: 10Gi
        oversubscription:
          tflopsOversellRatio: 2000
          vramExpandToHostDisk: 60
          vramExpandToHostMem: 50
        warmResources:
          cpu: '0'
          memory: '0'
          tflops: '10'
          vram: 5Gi
      componentConfig:
        client:
          embeddedModeImage: tensorfusion/tensor-fusion-client:latest
          image: tensorfusion/tensor-fusion-client:latest
          operatorEndpoint: http://tensor-fusion-sys.tensor-fusion-sys:8080
          patchToContainer:
            env:
            - name: TF_ENABLE_LOG
              value: '0'
            - name: TF_LOG_PATH
              value: /tmp/tf.log
          patchToPod:
            spec: {}
          remoteModeImage: tensorfusion/tensor-fusion-client:latest
        hypervisor:
          enableVector: true
          image: docker.io/tensorfusion/tensor-fusion-hypervisor:latest
          podTemplate:
            template:
              spec:
                containers:
                - env:
                  - name: TF_LOG_LEVEL
                    value: debug
                  # PPU accelerator shim (bundled in the vgpu-provider-ppu middleware image).
                  - name: TF_ACCELERATOR_LIB_PATH
                    value: /run/tensor-fusion/vgpu/libaccelerator_ppu.so
                  imagePullPolicy: IfNotPresent
                  name: tensor-fusion-hypervisor
                  resources:
                    limits:
                      cpu: 1000m
                      memory: 1Gi
                    requests:
                      cpu: 60m
                      memory: 128Mi
                  securityContext:
                    privileged: true
                    runAsGroup: 0
                    runAsUser: 0
                - name: vector
                  resources:
                    requests:
                      cpu: 50m
                      memory: 64Mi
                securityContext:
                  runAsGroup: 0
                  runAsUser: 0
          portNumber: 8001
          vectorImage: docker.m.daocloud.io/timberio/vector:latest-alpine
        nodeDiscovery:
          image: docker.m.daocloud.io/tensorfusion/tensor-fusion-node-discovery:latest
          podTemplate:
            template:
              spec:
                containers:
                - name: tensorfusion-node-discovery
        worker:
          image: tensorfusion/tensor-fusion-worker:latest
          podTemplate:
            template:
              spec:
                containers:
                - env:
                  - name: TF_ENABLE_LOG
                    value: '1'
                  # PPU ships same-name NVML / CUDA libs, so these mirror NVIDIA.
                  - name: TF_NVML_LIB_PATH
                    value: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1
                  - name: TF_CUDA_LIB_PATH
                    value: /usr/lib/x86_64-linux-gnu/libcuda.so.1
                  name: tensorfusion-worker
                  resources:
                    limits:
                      cpu: 2000m
                      memory: 8Gi
                    requests:
                      cpu: 100m
                      memory: 128Mi
      nodeManagerConfig:
        defaultVendor: PPU
        nodeCompaction:
          period: 30m
        nodePoolRollingUpdatePolicy:
          batchInterval: 1s
          batchPercentage: 20
          maintenanceWindow:
            includes:
            - 2 2 * * *
          maxDuration: 10m
        nodeSelector:
          nodeSelectorTerms:
          - matchExpressions:
            # PPU device-plugin node label (aliyun.com/ppu). Adjust to your cluster.
            - key: aliyun.com/ppu.present
              operator: In
              values:
              - 'true'
        provisioningMode: AutoSelect
      schedulingConfigTemplate: tf-scheduling-config

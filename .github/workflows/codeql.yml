name: CodeQL

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main
      - release/**
  schedule:
    - cron: "25 2 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: manual
          - language: c-cpp
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Manual build for Go
        if: matrix.language == 'go' && matrix.build-mode == 'manual'
        run: |
          # Mirror the repository's existing CI prep so vendored scheduler sources
          # are present before CodeQL traces the build.
          go mod vendor
          bash ./scripts/patch-scheduler.sh
          go build ./...

      - name: Manual build for C/C++
        if: matrix.language == 'c-cpp' && matrix.build-mode == 'manual'
        run: |
          make -C provider clean example test mock-app mock-test mock-rate-test

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
